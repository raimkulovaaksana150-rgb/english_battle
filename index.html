<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Universe - Kenesh Education School</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --blue: #1e3799; --red: #e74c3c; --green: #2ecc71; }
        body { font-family: 'Arial Black', sans-serif; background: #020617; color: white; margin: 0; overflow: hidden; }
        
        .sidebar { width: 260px; background: linear-gradient(180deg, var(--blue), #0c2461); border-right: 4px solid var(--gold); height: 100vh; float: left; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        .profile-img { width: 120px; height: 120px; border-radius: 50%; border: 4px solid white; object-fit: cover; box-shadow: 0 0 20px var(--gold); }
        .school-info { font-size: 0.8rem; text-align: center; color: var(--gold); margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; width: 100%; }

        .main-stage { margin-left: 260px; height: 100vh; position: relative; }
        .hidden { display: none !important; }

        /* CIRCULAR TIMER */
        .timer-box { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 80px; height: 80px; }
        .timer-svg { transform: rotate(-90deg); width: 80px; height: 80px; }
        .timer-circle { fill: none; stroke: var(--gold); stroke-width: 6; stroke-dasharray: 251; stroke-dashoffset: 0; transition: 0.1s linear; }

        /* MENU */
        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 30px; }
        .topic-btn { padding: 18px; border-radius: 12px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 0.8rem; transition: 0.3s; box-shadow: 0 5px #000; }
        .topic-btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* BATTLE AREA */
        .battle-zone { display: flex; justify-content: space-around; align-items: center; height: 85vh; padding: 20px; }
        .arena { width: 46%; background: rgba(255,255,255,0.08); border-radius: 30px; padding: 20px; border: 2px solid var(--gold); text-align: center; position: relative; }
        .q-img { width: 100%; height: 180px; border-radius: 15px; object-fit: cover; border: 2px solid #fff; margin-bottom: 10px; }
        .q-text { font-size: 1.2rem; color: #fff; margin-bottom: 15px; min-height: 50px; }
        .ans-in { width: 85%; padding: 12px; border-radius: 10px; font-size: 1.6rem; text-align: center; border: none; font-weight: bold; }
        
        .points-pop { position: absolute; top: -30px; right: 30px; font-size: 2rem; color: var(--green); animation: flyUp 0.8s forwards; display: none; }
        @keyframes flyUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-40px); } }

        #win-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, var(--blue), #000); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="sidebar">
        <img src="96064.jpg" class="profile-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/194/194931.png'">
        <h3 style="margin: 15px 0; text-align: center; font-size: 1rem;">Tukubai kyzy Aksana</h3>
        <p style="color: var(--gold); font-size: 0.8rem;">English Teacher</p>
        <div class="school-info">Kenesh Education School</div>
    </div>

    <div class="main-stage">
        <div id="home-screen">
            <h1 style="text-align: center; font-size: 3.5rem; color: var(--gold); padding-top: 40px;">ENGLISH UNIVERSE</h1>
            <div class="menu-grid">
                <button class="topic-btn" style="background:#e74c3c" onclick="start('animals')">🦁 ANIMALS</button>
                <button class="topic-btn" style="background:#3498db" onclick="start('food')">🍔 FOOD</button>
                <button class="topic-btn" style="background:#2ecc71" onclick="start('school')">📚 SCHOOL</button>
                <button class="topic-btn" style="background:#f1c40f; color:#000" onclick="start('family')">👪 FAMILY</button>
                <button class="topic-btn" style="background:#9b59b6" onclick="start('present_perfect')">📌 PRES. PERFECT</button>
                <button class="topic-btn" style="background:#e67e22" onclick="start('past_simple')">🕒 PAST SIMPLE</button>
                <button class="topic-btn" style="background:#1abc9c" onclick="start('modals')">⚡ MODALS</button>
                <button class="topic-btn" style="background:#d35400" onclick="start('comparison')">📏 COMPARISON</button>
            </div>
        </div>

        <div id="battle-screen" class="hidden">
            <div class="timer-box">
                <svg class="timer-svg"><circle class="timer-circle" cx="40" cy="40" r="36"></circle></svg>
            </div>
            <div class="battle-zone">
                <div class="arena">
                    <div id="pop1" class="points-pop">+10</div>
                    <h2 style="color:var(--red);">LIONS</h2>
                    <div style="font-size: 2rem; color: var(--gold);">⭐ <span id="s1">0</span></div>
                    <img id="img1" class="q-img" src="">
                    <div id="txt1" class="q-text"></div>
                    <input type="text" id="in1" class="ans-in" oninput="check(1)" autocomplete="off">
                </div>
                <div class="arena">
                    <div id="pop2" class="points-pop">+10</div>
                    <h2 style="color:#3498db;">EAGLES</h2>
                    <div style="font-size: 2rem; color: var(--gold);">⭐ <span id="s2">0</span></div>
                    <img id="img2" class="q-img" src="">
                    <div id="txt2" class="q-text"></div>
                    <input type="text" id="in2" class="ans-in" oninput="check(2)" autocomplete="off">
                </div>
            </div>
        </div>
    </div>

    <div id="win-screen" class="hidden">
        <div style="font-size: 10rem;">🏆</div>
        <h1 id="winner-txt" style="font-size: 4rem; color: var(--gold);">WINNER!</h1>
        <button style="padding: 20px 60px; font-size: 1.5rem; cursor: pointer; border-radius: 50px;" onclick="location.reload()">REPLAY</button>
    </div>

    <audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
    const database = {
        animals: [
            {q:"lion", t:"The king of the jungle?", i:"https://images.pexels.com/photos/247502/pexels-photo-247502.jpeg?w=300"},
            {q:"elephant", t:"The biggest land animal?", i:"https://images.pexels.com/photos/66898/elephant-cub-tsavo-kenya-66898.jpeg?w=300"}
        ],
        present_perfect: [
            {q:"seen", t:"I have ______ (see) this movie.", i:"https://images.pexels.com/photos/7991579/pexels-photo-7991579.jpeg?w=300"},
            {q:"broken", t:"He has ______ (break) the window.", i:"https://images.pexels.com/photos/5202925/pexels-photo-5202925.jpeg?w=300"}
        ],
        comparison: [
            {q:"taller", t:"Giraffe is ______ than lion.", i:"https://images.pexels.com/photos/806441/pexels-photo-806441.jpeg?w=300"}
        ]
    };

    let p1L=[], p2L=[], p1i=0, p2i=0, sc1=0, sc2=0, currentBonus=10, timerInt;

    function start(topic) {
        let list = database[topic] || database.animals;
        p1L = [...list].sort(() => Math.random() - 0.5);
        p2L = [...list].sort(() => Math.random() - 0.5);
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('battle-screen').classList.remove('hidden');
        document.getElementById('bg-music').play();
        load(1); load(2);
        resetTimer();
    }

    function resetTimer() {
        clearInterval(timerInt);
        let timeLeft = 10;
        const circle = document.querySelector('.timer-circle');
        timerInt = setInterval(() => {
            timeLeft -= 0.1;
            currentBonus = Math.max(1, Math.ceil(timeLeft));
            circle.style.strokeDashoffset = 251 - (timeLeft / 10) * 251;
            if(timeLeft <= 0) timeLeft = 10;
        }, 100);
    }

    function load(p) {
        let idx = (p==1) ? p1i : p2i;
        let list = (p==1) ? p1L : p2L;
        if(idx >= list.length) {
            document.getElementById('txt'+p).innerText = "DONE! ✅";
            document.getElementById('in'+p).style.display = "none";
            if(p1i >= p1L.length && p2i >= p2L.length) finish();
            return;
        }
        document.getElementById('img'+p).src = list[idx].i;
        document.getElementById('txt'+p).innerText = list[idx].t;
        document.getElementById('in'+p).value = "";
        document.getElementById('in'+p).focus();
    }

    function check(p) {
        let val = document.getElementById('in'+p).value.toLowerCase().trim();
        let list = (p==1) ? p1L : p2L;
        let idx = (p==1) ? p1i : p2i;
        if(val === list[idx].q.toLowerCase()) {
            let pts = currentBonus;
            if(p==1) { sc1 += pts; p1i++; document.getElementById('s1').innerText=sc1; }
            else { sc2 += pts; p2i++; document.getElementById('s2').innerText=sc2; }
            showPop(p, pts);
            load(p);
            resetTimer();
        }
    }

    function showPop(p, pts) {
        let el = document.getElementById('pop'+p);
        el.innerText = "+" + pts; el.style.display = "block";
        setTimeout(() => el.style.display = "none", 800);
    }

    function finish() {
        clearInterval(timerInt);
        document.getElementById('battle-screen').classList.add('hidden');
        document.getElementById('win-screen').classList.remove('hidden');
        let win = sc1 > sc2 ? "LIONS WIN!" : (sc2 > sc1 ? "EAGLES WIN!" : "DRAW!");
        document.getElementById('winner-txt').innerText = win;
        let end = Date.now() + 10000;
        (function frame() {
            confetti({ particleCount: 7, angle: 60, spread: 55, origin: { x: 0 } });
            confetti({ particleCount: 7, angle: 120, spread: 55, origin: { x: 1 } });
            if (Date.now() < end) requestAnimationFrame(frame);
        }());
    }
</script>
</body>
</html>
