<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Speed Battle Final - Aksana Tukubai</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --dark: #010a24; --accent: #00d4ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; }
        .sidebar { width: 260px; background: #051937; border-right: 4px solid var(--gold); height: 100vh; position: fixed; left: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; z-index: 10; }
        .logo { width: 100px; height: 100px; background: white; border-radius: 50%; border: 3px solid var(--gold); margin-bottom: 10px; }
        .main-stage { margin-left: 260px; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        .box { background: rgba(255,255,255,0.08); padding: 30px; border-radius: 20px; text-align: center; width: 800px; border: 1px solid var(--gold); }
        .arena-container { display: flex; width: 95%; gap: 20px; height: 90vh; }
        .arena { flex: 1; background: rgba(0,0,0,0.5); border: 2px solid var(--gold); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
        .q-img { width: 100%; height: 230px; object-fit: cover; border-radius: 15px; border: 2px solid white; }
        .ans-in { width: 90%; padding: 15px; font-size: 1.8rem; text-align: center; border-radius: 10px; border: none; outline: none; font-weight: bold; }
        .ans-in.correct { background: #2ecc71 !important; color: white; }
        .ans-in.wrong { background: #e74c3c !important; color: white; }
        .score { font-size: 3.5rem; color: var(--gold); font-weight: bold; margin: 5px 0; }
        .btn { padding: 12px 25px; background: var(--gold); border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; }
        /* Подиум стилдери */
        .podium-box { display: flex; align-items: flex-end; gap: 20px; margin-top: 30px; }
        .step { width: 150px; border-radius: 10px 10px 0 0; display: flex; flex-direction: column; align-items: center; color: #010a24; font-weight: bold; padding: 10px; }
        .step.gold { height: 180px; background: #ffd700; box-shadow: 0 0 20px var(--gold); }
        .step.silver { height: 130px; background: #bdc3c7; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo"><img src="96064.jpg" style="width:100%; height:100%; border-radius:50%;" onerror="this.src='https://img.icons8.com/bubbles/200/teacher.png'"></div>
    <h3 style="color:var(--gold); text-align:center;">SOURCE OF KNOWLEDGE</h3>
    <p>Aksana Tukubai</p>
</div>

<div class="main-stage">
    <div id="setup-screen" class="box">
        <h2>Enter Team Names</h2>
        <input type="text" id="t1" value="LIONS" style="padding:10px; margin:10px;">
        <input type="text" id="t2" value="EAGLES" style="padding:10px; margin:10px;">
        <br><button class="btn" onclick="openMenu()">CONTINUE</button>
    </div>

    <div id="menu-screen" class="box hidden">
        <h3>Choose Topic</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn" onclick="prepareBattle('animals')">Animals</button>
            <button class="btn" onclick="prepareBattle('fruits')">Fruits</button>
            <button class="btn" onclick="prepareBattle('school')">School</button>
            <button class="btn" onclick="prepareBattle('be')">To Be</button>
            <button class="btn" style="grid-column: span 2;" onclick="prepareBattle('past')">Past Simple</button>
        </div>
    </div>

    <div id="battle-screen" class="arena-container hidden">
        <div class="arena">
            <h2 id="name-1" style="color:#ff4757; margin:0;"></h2>
            <div class="score" id="score-1">0</div>
            <img id="img-1" class="q-img">
            <p id="text-1" style="font-size:1.3rem; height:40px;"></p>
            <input type="text" id="input-1" class="ans-in" autocomplete="off" oninput="check(1)">
        </div>
        <div class="arena">
            <h2 id="name-2" style="color:var(--accent); margin:0;"></h2>
            <div class="score" id="score-2">0</div>
            <img id="img-2" class="q-img">
            <p id="text-2" style="font-size:1.3rem; height:40px;"></p>
            <input type="text" id="input-2" class="ans-in" autocomplete="off" oninput="check(2)">
        </div>
    </div>

    <div id="win-screen" class="box hidden" style="position:fixed; inset:0; width:100%; height:100%; background:rgba(1,10,36,0.98); z-index:100;">
        <h1 id="winner-text" style="color:var(--gold); font-size:3rem;"></h1>
        <div class="podium-box" style="justify-content:center;">
            <div class="step silver">
                <div id="silver-name"></div>
                <div id="silver-score" style="font-size:1.5rem;"></div>
                <div style="font-size:2rem;">🥈</div>
            </div>
            <div class="step gold">
                <div id="gold-name"></div>
                <div id="gold-score" style="font-size:2rem;"></div>
                <div style="font-size:3.5rem;">👑</div>
            </div>
        </div>
        <br><button class="btn" onclick="location.reload()" style="margin-top:40px;">NEW GAME</button>
    </div>
</div>

<script>
    const data = {
        animals: [
            {q:"elephant", s:"Big animal with a trunk", i:"https://images.unsplash.com/photo-1557050543-4d5f4e07ef46?w=400"},
            {q:"lion", s:"King of the jungle", i:"https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=400"},
            {q:"giraffe", s:"Long necked animal", i:"https://images.unsplash.com/photo-1547721064-36202181c922?w=400"},
            {q:"monkey", s:"Loves to climb trees", i:"https://images.unsplash.com/photo-1540573133985-87b6da6d54a9?w=400"},
            {q:"tiger", s:"Large cat with stripes", i:"https://images.unsplash.com/photo-1508817628294-5a453fa0b8fb?w=400"}
        ],
        fruits: [
            {q:"apple", s:"Red round fruit", i:"https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?w=400"},
            {q:"banana", s:"Yellow long fruit", i:"https://images.unsplash.com/photo-1571771894821-ad9b588640ba?w=400"},
            {q:"lemon", s:"Sour yellow fruit", i:"https://images.unsplash.com/photo-1582979512210-99b6a53386f9?w=400"}
        ],
        school: [
            {q:"pencil", s:"Used for drawing", i:"https://images.unsplash.com/photo-1510172951991-856a654063f9?w=400"},
            {q:"book", s:"Read it for study", i:"https://images.unsplash.com/photo-1544947950-fa07a98d237f?w=400"},
            {q:"bag", s:"Carry your books", i:"https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=400"}
        ],
        be: [
            {q:"am", s:"I ___ a student.", i:"https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=400"},
            {q:"is", s:"He ___ a doctor.", i:"https://images.unsplash.com/photo-1529900748604-07564a03f7a6?w=400"},
            {q:"are", s:"They ___ happy.", i:"https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=400"}
        ],
        past: [
            {q:"was", s:"I ___ at home yesterday.", i:"https://images.unsplash.com/photo-1518780664697-55e3ad937233?w=400"},
            {q:"were", s:"They ___ busy.", i:"https://images.unsplash.com/photo-1519331379826-f10be5486c6f?w=400"},
            {q:"went", s:"She ___ to school.", i:"https://images.unsplash.com/photo-1509062522246-3755977927d7?w=400"}
        ]
    };

    let p1List=[], p2List=[], p1Idx=0, p2Idx=0, score1=0, score2=0;

    function openMenu() {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('menu-screen').classList.remove('hidden');
    }

    // Суроолорду чындап аралаштыруу функциясы
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function prepareBattle(topic) {
        p1List = shuffle([...data[topic]]);
        p2List = shuffle([...data[topic]]);
        document.getElementById('name-1').innerText = document.getElementById('t1').value;
        document.getElementById('name-2').innerText = document.getElementById('t2').value;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('battle-screen').classList.remove('hidden');
        
        loadQ(1); loadQ(2);
    }

    function loadQ(p) {
        let list = (p === 1) ? p1List : p2List;
        let idx = (p === 1) ? p1Idx : p2Idx;

        if (idx >= list.length) {
            checkEnd(); return;
        }

        document.getElementById('img-' + p).src = list[idx].i;
        document.getElementById('text-' + p).innerText = list[idx].s;
        document.getElementById('input-' + p).value = "";
        document.getElementById('input-' + p).className = "ans-in";
        document.getElementById('input-' + p).focus();
    }

    function check(p) {
        let input = document.getElementById('input-' + p);
        let val = input.value.toLowerCase().trim();
        let list = (p === 1) ? p1List : p2List;
        let idx = (p === 1) ? p1Idx : p2Idx;
        let correct = list[idx].q;

        if (val === correct) {
            input.classList.add('correct');
            if (p === 1) { score1 += 20; p1Idx++; document.getElementById('score-1').innerText = score1; }
            else { score2 += 20; p2Idx++; document.getElementById('score-2').innerText = score2; }
            setTimeout(() => loadQ(p), 400);
        } else if (val.length >= correct.length) { // Ката жазса кийинкиге өтөт
            input.classList.add('wrong');
            setTimeout(() => {
                if (p === 1) p1Idx++; else p2Idx++;
                loadQ(p);
            }, 600);
        }
    }

    function checkEnd() {
        if (p1Idx >= p1List.length && p2Idx >= p2List.length) {
            document.getElementById('battle-screen').classList.add('hidden');
            document.getElementById('win-screen').classList.remove('hidden');
            
            let n1 = document.getElementById('t1').value, n2 = document.getElementById('t2').value;
            if (score1 >= score2) {
                showWinner(n1, score1, n2, score2);
            } else {
                showWinner(n2, score2, n1, score1);
            }
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    }

    function showWinner(wN, wS, lN, lS) {
        document.getElementById('winner-text').innerText = wN + " WINS!";
        document.getElementById('gold-name').innerText = wN;
        document.getElementById('gold-score').innerText = wS;
        document.getElementById('silver-name').innerText = lN;
        document.getElementById('silver-score').innerText = lS;
    }
</script>
</body>
</html>
