<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>English Battle - Aksana Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --dark: #010a24; --red: #ff4757; --green: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; }
        .sidebar { width: 260px; background: #051937; border-right: 3px solid var(--gold); height: 100vh; position: fixed; left: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; text-align: center; }
        .profile-img { width: 120px; height: 120px; background: #fff; border-radius: 50%; border: 4px solid var(--gold); overflow: hidden; margin-bottom: 15px; }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }
        .main-stage { margin-left: 260px; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        .box { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; text-align: center; width: 800px; border: 2px solid var(--gold); backdrop-filter: blur(10px); }
        .arena-container { display: flex; width: 95%; gap: 20px; height: 90vh; }
        .arena { flex: 1; background: rgba(0,0,0,0.6); border: 2px solid var(--gold); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: space-around; }
        .q-img { width: 220px; height: 220px; object-fit: contain; }
        .score { font-size: 4rem; color: var(--gold); font-weight: bold; }
        .ans-in { width: 85%; padding: 15px; font-size: 2rem; text-align: center; border-radius: 12px; border: 4px solid #fff; outline: none; transition: 0.2s; background: white; color: black; }
        
        .wrong { border-color: var(--red) !important; background: #ffcccc !important; animation: shake 0.3s; }
        .correct { border-color: var(--green) !important; background: #e6ffed !important; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .btn { padding: 20px; background: var(--gold); border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.5rem; color: #010a24; width: 100%; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="profile-img"><img src="96064.jpg" onerror="this.src='https://img.icons8.com/bubbles/200/teacher.png'"></div>
    <h3 style="margin: 10px 0;">Aksana Tukubai kyzy</h3>
    <p style="color:var(--accent); font-weight: bold;">Kenesh General School</p>
    <p style="color:var(--gold); margin-top: 20px;">MASTER CLASS 2026</p>
</div>

<div class="main-stage">
    <div id="setup-screen" class="box">
        <h1 style="color:var(--gold);">BATTLE REGISTRATION</h1>
        <div style="display:flex; gap:20px; margin: 30px 0;">
            <input type="text" id="t1" value="LIONS" style="flex:1; padding:15px; font-size:1.5rem; text-align:center;">
            <input type="text" id="t2" value="EAGLES" style="flex:1; padding:15px; font-size:1.5rem; text-align:center;">
        </div>
        <button class="btn" onclick="openMenu()">CONTINUE</button>
    </div>

    <div id="menu-screen" class="box hidden">
        <h2 style="color:var(--gold);">CHOOSE TOPIC</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <button class="btn" onclick="start('animals')">🦁 ANIMALS</button>
            <button class="btn" onclick="start('school')">🎒 SCHOOL ITEMS</button>
        </div>
    </div>

    <div id="battle-screen" class="arena-container hidden">
        <div class="arena">
            <h2 id="name-1" style="color:#ff4757;"></h2>
            <div class="score" id="score-1">0</div>
            <img id="img-1" class="q-img">
            <input type="text" id="input-1" class="ans-in" onkeydown="handleEnter(event, 1)" placeholder="Type & Enter" autocomplete="off">
        </div>
        <div class="arena">
            <h2 id="name-2" style="color:#00d4ff;"></h2>
            <div class="score" id="score-2">0</div>
            <img id="img-2" class="q-img">
            <input type="text" id="input-2" class="ans-in" onkeydown="handleEnter(event, 2)" placeholder="Type & Enter" autocomplete="off">
        </div>
    </div>

    <div id="win-screen" class="box hidden">
        <h1 id="winner-text" style="color:var(--gold); font-size:4rem;"></h1>
        <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
    </div>
</div>

<script>
    const quizData = {
        animals: [
            {q:"lion", i:"https://img.icons8.com/color/240/lion.png"},
            {q:"elephant", i:"https://img.icons8.com/color/240/elephant.png"},
            {q:"monkey", i:"https://img.icons8.com/color/240/monkey.png"},
            {q:"zebra", i:"https://img.icons8.com/color/240/zebra.png"},
            {q:"tiger", i:"https://img.icons8.com/color/240/tiger-side-view.png"},
            {q:"panda", i:"https://img.icons8.com/color/240/panda.png"},
            {q:"fox", i:"https://img.icons8.com/color/240/fox.png"},
            {q:"rabbit", i:"https://img.icons8.com/color/240/rabbit.png"}
        ],
        school: [
            {q:"pen", i:"https://img.icons8.com/color/240/pen.png"},
            {q:"pencil", i:"https://img.icons8.com/color/240/pencil.png"},
            {q:"book", i:"https://img.icons8.com/color/240/book.png"},
            {q:"bag", i:"https://img.icons8.com/color/240/backpack.png"},
            {q:"ruler", i:"https://img.icons8.com/color/240/ruler.png"},
            {q:"desk", i:"https://img.icons8.com/color/240/desk.png"},
            {q:"map", i:"https://img.icons8.com/color/240/map.png"},
            {q:"glue", i:"https://img.icons8.com/color/240/glue.png"}
        ]
    };

    let p1L, p2L, p1I, p2I, s1, s2;

    function openMenu() {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('menu-screen').classList.remove('hidden');
    }

    function start(topic) {
        p1L = [...quizData[topic]].sort(()=>Math.random()-0.5);
        p2L = [...quizData[topic]].sort(()=>Math.random()-0.5);
        p1I = 0; p2I = 0; s1 = 0; s2 = 0;
        document.getElementById('name-1').innerText = document.getElementById('t1').value;
        document.getElementById('name-2').innerText = document.getElementById('t2').value;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('battle-screen').classList.remove('hidden');
        load(1); load(2);
    }

    function load(p) {
        let list = (p==1) ? p1L : p2L;
        let idx = (p==1) ? p1I : p2I;
        if(idx >= list.length) {
            if(p1I >= p1L.length && p2I >= p2L.length) finish();
            return;
        }
        document.getElementById('img-'+p).src = list[idx].i;
        let inp = document.getElementById('input-'+p);
        inp.value = ""; 
        inp.className = "ans-in";
        inp.disabled = false;
        if(p==1) inp.focus();
    }

    function handleEnter(event, p) {
        if (event.key === "Enter") {
            check(p);
        }
    }

    function check(p) {
        let inp = document.getElementById('input-'+p);
        let val = inp.value.toLowerCase().trim();
        let list = (p==1) ? p1L : p2L;
        let idx = (p==1) ? p1I : p2I;
        
        if (idx >= list.length) return;
        
        let correctAns = list[idx].q;
        inp.disabled = true;

        if (val === correctAns) {
            inp.classList.add('correct');
            if(p==1) { s1+=10; p1I++; document.getElementById('score-1').innerText = s1; }
            else { s2+=10; p2I++; document.getElementById('score-2').innerText = s2; }
            setTimeout(() => load(p), 400);
        } else {
            inp.classList.add('wrong');
            if(p==1) p1I++; else p2I++; 
            setTimeout(() => load(p), 400);
        }
    }

    function finish() {
        document.getElementById('battle-screen').classList.add('hidden');
        document.getElementById('win-screen').classList.remove('hidden');
        let n1 = document.getElementById('t1').value;
        let n2 = document.getElementById('t2').value;
        let winName = s1 > s2 ? n1 : (s2 > s1 ? n2 : "DRAW");
        document.getElementById('winner-text').innerText = winName + " WINS! 🏆";
        confetti({ particleCount: 150, spread: 70 });
    }
</script>
</body>
</html>
