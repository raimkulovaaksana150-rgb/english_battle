<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Speed Battle - Aksana Tukubai kyzy</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --dark: #010a24; --accent: #00d4ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; }
        
        .sidebar { width: 260px; background: #051937; border-right: 4px solid var(--gold); height: 100vh; position: fixed; left: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; z-index: 100; text-align: center; }
        .profile-img { width: 120px; height: 120px; background: #fff; border-radius: 50%; border: 3px solid var(--gold); overflow: hidden; margin-bottom: 15px; }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .main-stage { margin-left: 260px; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }
        .hidden { display: none !important; }
        .box { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; text-align: center; width: 600px; border: 2px solid var(--gold); backdrop-filter: blur(10px); }
        
        .arena-container { display: flex; width: 95%; gap: 20px; height: 90vh; }
        .arena { flex: 1; background: rgba(0,0,0,0.5); border: 2px solid var(--gold); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: space-around; }
        .q-img { width: 100%; height: 250px; object-fit: contain; border-radius: 10px; background: #fff; }
        .score { font-size: 3rem; color: var(--gold); font-weight: bold; margin: 10px 0; }
        .ans-in { width: 80%; padding: 12px; font-size: 1.5rem; text-align: center; border-radius: 10px; border: none; outline: none; font-weight: bold; }
        
        .btn { padding: 15px 30px; background: var(--gold); border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.2rem; color: #010a24; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); filter: brightness(1.1); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
    </style>
</head>
<body>

<audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>

<div class="sidebar">
    <div class="profile-img">
        <img src="96064.jpg" alt="Teacher" onerror="this.src='https://img.icons8.com/bubbles/200/teacher.png'">
    </div>
    <p style="font-weight: bold; margin: 5px 0;">Aksana Tukubai kyzy</p>
    <p style="font-size: 0.8rem; color: var(--accent);">English Teacher</p>
    <hr style="width: 80%; border: 0.5px solid var(--gold); opacity: 0.5;">
    <p style="font-size: 0.7rem;">Kenesh Secondary School</p>
</div>

<div class="main-stage">
    <div id="setup-screen" class="box">
        <h2 style="color:var(--gold);">ENTER TEAM NAMES</h2>
        <input type="text" id="t1" value="TEAM 1" style="padding:10px; margin: 10px; width: 70%; font-size: 1.2rem; border-radius: 5px;"><br>
        <input type="text" id="t2" value="TEAM 2" style="padding:10px; margin: 10px; width: 70%; font-size: 1.2rem; border-radius: 5px;"><br><br>
        <button class="btn" onclick="goToMenu()">CONTINUE ➔</button>
    </div>

    <div id="menu-screen" class="box hidden">
        <h2 style="color:var(--gold);">CHOOSE CATEGORY</h2>
        <div class="menu-grid">
            <button class="btn" onclick="startGame('animals')">🦁 Animals</button>
            <button class="btn" onclick="startGame('fruits')">🍎 Fruits</button>
            <button class="btn" onclick="startGame('school')">🎒 School</button>
            <button class="btn" onclick="startGame('colors')">🎨 Colors</button>
        </div>
    </div>

    <div id="battle-screen" class="arena-container hidden">
        <div class="arena">
            <h3 id="name-1" style="color: #ff4757;"></h3>
            <div class="score" id="score-1">0</div>
            <img id="img-1" class="q-img" src="">
            <p id="hint-1" style="font-weight: bold;"></p>
            <input type="text" id="input-1" class="ans-in" placeholder="Type here..." oninput="checkAnswer(1)">
        </div>
        <div class="arena">
            <h3 id="name-2" style="color: var(--accent);"></h3>
            <div class="score" id="score-2">0</div>
            <img id="img-2" class="q-img" src="">
            <p id="hint-2" style="font-weight: bold;"></p>
            <input type="text" id="input-2" class="ans-in" placeholder="Type here..." oninput="checkAnswer(2)">
        </div>
    </div>

    <div id="win-screen" class="box hidden">
        <h1 id="winner-text" style="color:var(--gold); font-size: 3rem;"></h1>
        <button class="btn" onclick="location.reload()">RESTART</button>
    </div>
</div>

<script>
const data = {

        {q:"elephant", s:"Very big animal with a trunk.", i:"https://cdn-icons-png.flaticon.com/512/616/616430.png"},
        {q:"rabbit", s:"Loves carrots and jumping.", i:"https://cdn-icons-png.flaticon.com/512/616/616444.png"}
    ],
    fruits: [
