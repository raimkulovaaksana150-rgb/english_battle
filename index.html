<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Aksana - English Battle</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #050a18; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .main-content { flex-grow: 1; display: flex; flex-direction: column; text-align: center; }
        .sidebar { width: 180px; background: linear-gradient(180deg, #1e3799, #0c2461); border-left: 4px solid #f1c40f; display: flex; flex-direction: column; align-items: center; padding-top: 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #f1c40f; object-fit: cover; margin-bottom: 10px; }
        .sidebar h3 { font-size: 1rem; margin: 5px; color: #f1c40f; }
        .sidebar p { font-size: 0.8rem; padding: 0 10px; }

        .hidden { display: none !important; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 700px; margin: auto; padding: 20px; }
        .topic-btn { padding: 20px; border-radius: 15px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .topic-btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        .battle-container { display: flex; justify-content: space-around; padding: 20px; gap: 20px; height: 80vh; align-items: center; }
        .arena { width: 45%; background: rgba(255,255,255,0.05); border-radius: 25px; border: 2px solid #333; padding: 20px; box-sizing: border-box; }
        .q-img { width: 100%; height: 200px; border-radius: 15px; object-fit: cover; border: 2px solid white; }
        .q-text { background: white; color: #111; padding: 15px; border-radius: 10px; margin: 15px 0; font-weight: bold; font-size: 1.2rem; min-height: 50px; display: flex; align-items: center; justify-content: center; }
        .ans-input { width: 90%; padding: 15px; border-radius: 10px; border: 3px solid #3498db; font-size: 1.3rem; text-align: center; outline: none; }
        .star-box { font-size: 1.8rem; color: #f1c40f; margin-bottom: 10px; }

        #victory-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050a18; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="main-content">
        <div id="home-screen">
            <h1 style="font-size: 2.5rem; margin-top: 50px;">English Battle Game</h1>
            <p>Теманы тандап, мелдешти баштаңыз!</p>
            <div class="menu-grid">
                <button class="topic-btn" style="background:#e74c3c" onclick="startBattle('animals')">🦁 ANIMALS</button>
                <button class="topic-btn" style="background:#3498db" onclick="startBattle('family')">👨‍👩‍👧‍👦 FAMILY</button>
                <button class="topic-btn" style="background:#9b59b6" onclick="startBattle('grammar')">📝 TO BE</button>
                <button class="topic-btn" style="background:#2ecc71" onclick="startBattle('school')">🏫 SCHOOL</button>
                <button class="topic-btn" style="background:#f39c12" onclick="startBattle('food')">🍎 FOOD</button>
                <button class="topic-btn" style="background:#c0392b" onclick="startBattle('numbers')">📅 TIME & CALENDAR</button>
            </div>
        </div>

        <div id="battle-screen" class="hidden">
            <div class="battle-container">
                <div class="arena">
                    <h2 id="t1-n" style="color:#e74c3c; margin:0;">TEAM 1</h2>
                    <div class="star-box">⭐ <span id="s1">0</span></div>
                    <img id="img1" class="q-img" src="">
                    <div id="q1" class="q-text"></div>
                    <input type="text" id="in1" class="ans-input" autocomplete="off" placeholder="..." oninput="checkAns(1)">
                </div>
                <div class="arena">
                    <h2 id="t2-n" style="color:#3498db; margin:0;">TEAM 2</h2>
                    <div class="star-box">⭐ <span id="s2">0</span></div>
                    <img id="img2" class="q-img" src="">
                    <div id="q2" class="q-text"></div>
                    <input type="text" id="in2" class="ans-input" autocomplete="off" placeholder="..." oninput="checkAns(2)">
                </div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <img src="96064.jpg" class="profile-img" alt="Aksana">
        <h3>Aksana</h3>
        <p>English Teacher</p>
        <hr style="width: 80%; border: 0.5px solid #f1c40f; margin: 20px 0;">
        <div style="font-size: 0.7rem; opacity: 0.8;">
            <p>Score Points</p>
            <p>Win the Cup</p>
        </div>
    </div>

    <div id="victory-screen" class="hidden">
        <h1 id="winner-tag" style="font-size: 4rem; color: #f1c40f;">WINNER!</h1>
        <div style="font-size: 8rem;">🏆</div>
        <button class="topic-btn" style="background:white; color:black; padding:15px 40px; margin-top:30px;" onclick="location.reload()">RESTART</button>
    </div>

    <audio id="bg-music" loop src="https://upload.wikimedia.org/wikipedia/commons/0/07/Kyrgyz_instrumental_music.mp3"></audio>
    <audio id="win-music" src="https://cdn.pixabay.com/audio/2021/08/04/audio_bbd1303901.mp3"></audio>

<script>
    const data = {
        animals: [
            {q:"King of the jungle?", a:"lion", i:"https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=400"},
            {q:"Long neck animal?", a:"giraffe", i:"https://images.unsplash.com/photo-1547721064-3625b669fa95?w=400"},
            {q:"Biggest land animal?", a:"elephant", i:"https://images.unsplash.com/photo-1557050543-4d5f4e07ef46?w=400"}
        ],
        numbers: [
            {q:"How many months in a year?", a:"twelve", i:"https://images.unsplash.com/photo-1506784983877-45594efa4cbe?w=400"},
            {q:"How many days in a week?", a:"seven", i:"https://images.unsplash.com/photo-1435527173128-983b87501f4d?w=400"},
            {q:"How many seasons in a year?", a:"four", i:"https://images.unsplash.com/photo-1470252649378-9c29740c9fa8?w=400"},
            {q:"How many minutes in 1 hour?", a:"sixty", i:"https://images.unsplash.com/photo-1508962914676-134849a727f0?w=400"}
        ],
        school: [
            {q:"You read it?", a:"book", i:"https://images.unsplash.com/photo-1495446815901-a7297e633e8d?w=400"},
            {q:"Teacher writes on it?", a:"board", i:"https://images.unsplash.com/photo-1541170716948-9944963bf973?w=400"}
        ],
        food: [{q:"Yellow fruit?", a:"banana", i:"https://images.unsplash.com/photo-1571771894821-ad9958a3f747?w=400"}],
        family: [{q:"Father's wife?", a:"mother", i:"https://images.unsplash.com/photo-1510154221590-ff63e90a136f?w=400"}],
        grammar: [{q:"I ___ a teacher.", a:"am", i:"https://images.unsplash.com/photo-1524178232363-1fb2b075b655?w=400"}]
    };

    let p1L = [], p2L = [], p1I = 0, p2I = 0, sc1 = 0, sc2 = 0;

    function startBattle(topic) {
        let n1 = prompt("Team 1:", "LIONS");
        let n2 = prompt("Team 2:", "EAGLES");
        document.getElementById('t1-n').innerText = n1 || "LIONS";
        document.getElementById('t2-n').innerText = n2 || "EAGLES";

        p1L = [...data[topic]].sort(() => Math.random() - 0.5);
        p2L = [...data[topic]].sort(() => Math.random() - 0.5);
        
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('battle-screen').classList.remove('hidden');
        document.getElementById('bg-music').play().catch(()=>{});

        render(1); render(2);
    }

    function render(p) {
        const list = (p === 1) ? p1L : p2L;
        const index = (p === 1) ? p1I : p2I;
        if (index >= list.length) return checkEnd();

        const cur = list[index];
        document.getElementById('q' + p).innerText = cur.q;
        document.getElementById('img' + p).src = cur.i;
        
        const input = document.getElementById('in' + p);
        input.value = "";
        // Подсказканы өчүрүү үчүн динамикалык ат берилет
        input.setAttribute('name', 'field_' + Math.random());
    }

    function checkAns(p) {
        const val = document.getElementById('in' + p).value.trim().toLowerCase();
        const list = (p === 1) ? p1L : p2L;
        const index = (p === 1) ? p1I : p2I;

        if (val === list[index].a) {
            if (p === 1) { sc1++; p1I++; document.getElementById('s1').innerText = sc1; }
            else { sc2++; p2I++; document.getElementById('s2').innerText = sc2; }
            render(p);
        }
    }

    function checkEnd() {
        if (p1I >= p1L.length && p2I >= p2L.length) {
            document.getElementById('battle-screen').classList.add('hidden');
            document.getElementById('victory-screen').classList.remove('hidden');
            document.getElementById('bg-music').pause();
            document.getElementById('win-music').play();

            let win = sc1 > sc2 ? document.getElementById('t1-n').innerText : (sc2 > sc1 ? document.getElementById('t2-n').innerText : "TIE");
            document.getElementById('winner-tag').innerText = win + " WINS!";
            
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    }
</script>
</body>
</html>
