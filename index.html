<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Aksana - Kenesh School</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e14; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR LEFT */
        .sidebar { width: 250px; background: linear-gradient(180deg, #1a2a6c, #b21f1f, #fdbb2d); border-right: 5px solid #f1c40f; display: flex; flex-direction: column; align-items: center; padding-top: 30px; box-shadow: 10px 0 20px rgba(0,0,0,0.5); z-index: 100; }
        .profile-img { width: 130px; height: 130px; border-radius: 50%; border: 4px solid #fff; object-fit: cover; box-shadow: 0 0 15px #f1c40f; }
        .sidebar h3 { font-size: 1.2rem; margin: 15px 0 5px 0; color: #fff; text-shadow: 2px 2px 4px #000; }
        .school-name { font-size: 0.9rem; font-weight: bold; color: #eee; text-align: center; padding: 10px; border-top: 1px solid rgba(255,255,255,0.3); margin-top: 15px; }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        .hidden { display: none !important; }

        /* BATTERY TIMER */
        #battery-container { width: 200px; height: 40px; border: 4px solid #fff; border-radius: 8px; margin: 20px auto; position: relative; padding: 3px; background: #333; }
        #battery-level { height: 100%; width: 100%; background: #2ecc71; transition: 0.3s; border-radius: 2px; }
        #battery-tip { width: 10px; height: 20px; background: #fff; position: absolute; right: -14px; top: 7px; border-radius: 0 3px 3px 0; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 800px; margin: auto; padding: 20px; }
        .topic-btn { padding: 25px; border-radius: 15px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        .topic-btn:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255,255,255,0.2); }

        .battle-container { display: flex; justify-content: space-around; padding: 20px; height: 70vh; align-items: center; }
        .arena { width: 46%; background: rgba(0,0,0,0.6); border: 2px solid #f1c40f; border-radius: 20px; padding: 20px; text-align: center; }
        .q-img { width: 100%; height: 200px; border-radius: 15px; object-fit: cover; margin-bottom: 15px; border: 2px solid #fff; }
        .ans-input { width: 85%; padding: 15px; border-radius: 10px; border: none; font-size: 1.4rem; text-align: center; background: #fff; color: #333; }

        /* WINNER SCREEN */
        #victory-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a2a6c, #0b0e14); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #music-toggle { position: absolute; top: 20px; right: 20px; padding: 10px 20px; border-radius: 50px; border: none; background: #2ecc71; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <img src="96064.jpg" class="profile-img">
        <h3>Tukubai kyzy Aksana</h3>
        <p style="color: #f1c40f;">English Teacher</p>
        <div class="school-name">Kenesh Secondary School</div>
    </div>

    <div class="main-content">
        <button id="music-toggle" onclick="handleMusic()">🎵 Music: OFF</button>
        
        <div id="home-screen">
            <h1 style="text-align: center; font-size: 3rem; margin-top: 50px; text-shadow: 0 0 20px #f1c40f;">ENGLISH BATTLE</h1>
            
            <div id="battery-container">
                <div id="battery-level"></div>
                <div id="battery-tip"></div>
            </div>

            <div class="menu-grid">
                <button class="topic-btn" style="background:#ff4757" onclick="startBattle('animals')">🦁 ANIMALS</button>
                <button class="topic-btn" style="background:#2f3542" onclick="startBattle('opposites')">↔️ OPPOSITES</button>
                <button class="topic-btn" style="background:#ffa502" onclick="startBattle('food')">🍕 FOOD</button>
                <button class="topic-btn" style="background:#2ecc71" onclick="startBattle('school')">🎒 SCHOOL</button>
                <button class="topic-btn" style="background:#1e90ff" onclick="startBattle('verbs')">🏃 VERBS</button>
                <button class="topic-btn" style="background:#a29bfe" onclick="startBattle('colors')">🎨 COLORS</button>
            </div>
        </div>

        <div id="battle-screen" class="hidden">
            <div class="battle-container">
                <div class="arena">
                    <h2 id="t1-name" style="color:#ff4757;">LIONS</h2>
                    <div style="font-size: 2.5rem; margin-bottom: 10px;">⭐ <span id="s1">0</span></div>
                    <img id="img1" class="q-img" src="">
                    <input type="text" id="in1" class="ans-input" placeholder="Type here..." autocomplete="off" oninput="check(1)">
                </div>
                <div class="arena">
                    <h2 id="t2-name" style="color:#1e90ff;">EAGLES</h2>
                    <div style="font-size: 2.5rem; margin-bottom: 10px;">⭐ <span id="s2">0</span></div>
                    <img id="img2" class="q-img" src="">
                    <input type="text" id="in2" class="ans-input" placeholder="Type here..." autocomplete="off" oninput="check(2)">
                </div>
            </div>
        </div>
    </div>

    <div id="victory-screen" class="hidden">
        <h1 id="win-text" style="font-size: 5rem; color: #f1c40f; text-shadow: 0 0 30px #fff;">WINNER!</h1>
        <div style="font-size: 10rem;">🏆</div>
        <button class="topic-btn" style="background:#fff; color:#000; padding: 15px 40px; margin-top: 30px;" onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <audio id="bg-m" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
    const questions = {
        animals: [
            {q:"lion", i:"https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=400"},
            {q:"tiger", i:"https://images.unsplash.com/photo-1549480017-d76466a4b7e8?w=400"},
            {q:"monkey", i:"https://images.unsplash.com/photo-1540573133985-87b6da6d54a9?w=400"},
            {q:"elephant", i:"https://images.unsplash.com/photo-1557050543-4d5f4e07ef46?w=400"},
            {q:"rabbit", i:"https://images.unsplash.com/photo-1585110396000-c9ffd4e4b308?w=400"}
        ],
        school: [
            {q:"pen", i:"https://images.unsplash.com/photo-1583485088034-697b5bc54ccd?w=400"},
            {q:"book", i:"https://images.unsplash.com/photo-1495446815901-a7297e633e8d?w=400"},
            {q:"ruler", i:"https://images.unsplash.com/photo-1586075010633-2470fd205d6a?w=400"}
        ]
        // Сиз каалаган суроолорду ушинтип кошо берсеңиз болот
    };

    let p1idx = 0, p2idx = 0, s1 = 0, s2 = 0, list = [], timeLeft = 100, timer;

    function handleMusic() {
        const m = document.getElementById('bg-m');
        const b = document.getElementById('music-toggle');
        if(m.paused) { m.play(); b.innerText="🎵 Music: ON"; b.style.background="#ff4757"; }
        else { m.pause(); b.innerText="🎵 Music: OFF"; b.style.background="#2ecc71"; }
    }

    function startBattle(topic) {
        list = questions[topic] || questions.animals;
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('battle-screen').classList.remove('hidden');
        
        load(1); load(2);
        timer = setInterval(() => {
            timeLeft -= 1;
            document.getElementById('battery-level').style.width = timeLeft + "%";
            if(timeLeft <= 0) endGame();
        }, 1000);
    }

    function load(p) {
        let idx = (p==1) ? p1idx : p2idx;
        if(idx >= list.length) return;
        document.getElementById('img'+p).src = list[idx].i;
        document.getElementById('in'+p).value = "";
        document.getElementById('in'+p).focus();
    }

    function check(p) {
        let val = document.getElementById('in'+p).value.toLowerCase().trim();
        let idx = (p==1) ? p1idx : p2idx;
        if(val === list[idx].q) {
            if(p==1) { s1++; p1idx++; document.getElementById('s1').innerText=s1; }
            else { s2++; p2idx++; document.getElementById('s2').innerText=s2; }
            
            if(p1idx >= list.length || p2idx >= list.length) endGame();
            else load(p);
        }
    }

    function endGame() {
        clearInterval(timer);
        document.getElementById('battle-screen').classList.add('hidden');
        document.getElementById('victory-screen').classList.remove('hidden');
        
        let win = s1 > s2 ? "LIONS" : (s2 > s1 ? "EAGLES" : "TIE");
        document.getElementById('win-text').innerText = win + " WINS!";
        
        // CONFETTI SHOW
        var end = Date.now() + (10 * 1000);
        (function frame() {
            confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
            confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });
            if (Date.now() < end) requestAnimationFrame(frame);
        }());
    }
</script>
</body>
</html>
