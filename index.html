<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>English Speed Battle - Aksana Tukubai kyzy</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --dark: #010a24; --accent: #00d4ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; }
        
        /* Профиль бөлүмү - Мектептин аты кошулду */
        .sidebar { width: 280px; background: #051937; border-right: 4px solid var(--gold); height: 100vh; position: fixed; left: 0; display: flex; flex-direction: column; align-items: center; padding: 25px 15px; z-index: 10; text-align: center; }
        .profile-img { width: 140px; height: 140px; background: #fff; border-radius: 50%; border: 4px solid var(--gold); overflow: hidden; margin-bottom: 20px; }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .school-name { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin-top: 10px; line-height: 1.4; }
        .teacher-name { font-weight: bold; color: #fff; font-size: 1.3rem; margin: 5px 0; }

        .main-stage { margin-left: 280px; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        .box { background: rgba(255,255,255,0.08); padding: 30px; border-radius: 20px; text-align: center; width: 850px; border: 1px solid var(--gold); backdrop-filter: blur(10px); }
        
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .arena-container { display: flex; width: 98%; gap: 15px; height: 95vh; padding: 10px; box-sizing: border-box; }
        .arena { flex: 1; background: rgba(0,0,0,0.6); border: 3px solid var(--gold); border-radius: 25px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; position: relative; }
        .q-img { width: 100%; height: 260px; object-fit: cover; border-radius: 15px; border: 2px solid white; }
        .score { font-size: 3.8rem; color: var(--gold); font-weight: bold; margin: 0; }
        .ans-in { width: 90%; padding: 15px; font-size: 1.8rem; text-align: center; border-radius: 12px; border: 4px solid #fff; outline: none; font-weight: bold; color: #010a24; }
        .ans-in.correct { background: #2ecc71 !important; color: white; }
        
        .btn { padding: 15px 10px; background: var(--gold); border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1rem; color: #010a24; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); }
        .bonus-badge { position: absolute; top: 10px; right: 10px; background: #ff4757; color: white; padding: 5px 10px; border-radius: 5px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
<audio id="correct-sound" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>

<div class="sidebar">
    <div class="profile-img">
        <img src="96064.jpg" alt="Aksana Tukubai kyzy" onerror="this.src='https://img.icons8.com/bubbles/200/teacher.png'">
    </div>
    <h3 style="color:var(--gold); font-size: 0.9rem; margin-bottom: 5px; text-transform: uppercase;">Source of Knowledge</h3>
    <p class="teacher-name">Aksana Tukubai kyzy</p>
    <p class="school-name">Kenesh General <br> Education School</p>
    <hr style="width: 85%; border: 0.5px solid var(--gold); opacity: 0.3; margin: 25px 0;">
</div>

<div class="main-stage">
    <div id="setup-screen" class="box">
        <h1 style="color:var(--gold); font-size: 2.5rem;">BATTLE REGISTRATION</h1>
        <div style="margin: 30px 0; display: flex; justify-content: center; gap: 20px; align-items: center;">
            <input type="text" id="t1" value="LIONS" style="padding:15px; font-size:1.5rem; border-radius:10px; width: 35%;">
            <span style="font-size: 2rem; font-weight: bold;">VS</span>
            <input type="text" id="t2" value="EAGLES" style="padding:15px; font-size:1.5rem; border-radius:10px; width: 35%;">
        </div>
        <button class="btn" style="width: 200px;" onclick="openMenu()">CONTINUE ➔</button>
    </div>

    <div id="menu-screen" class="box hidden">
        <h2 style="color:var(--gold);">CHOOSE TOPIC</h2>
        <div class="menu-grid">
            <button class="btn" onclick="startBattle('animals')">🦁 Animals</button>
            <button class="btn" onclick="startBattle('fruits')">🍎 Fruits</button>
            <button class="btn" onclick="startBattle('school')">🎒 School</button>
            <button class="btn" onclick="startBattle('colors')">🎨 Colors</button>
            <button class="btn" onclick="startBattle('body')">🦴 Body Parts</button>
            <button class="btn" onclick="startBattle('clothes')">👕 Clothes</button>
            <button class="btn" style="background:#9b59b6; color:white;" onclick="startBattle('tobe')">📝 Am/Is/Are</button>
            <button class="btn" style="background:#9b59b6; color:white;" onclick="startBattle('plural')">👥 Plurals</button>
            <button class="btn" style="background:#9b59b6; color:white;" onclick="startBattle('pronouns')">👤 Pronouns</button>
            <button class="btn" style="background:#9b59b6; color:white;" onclick="startBattle('prepo')">📍 Prepositions</button>
            <button class="btn" style="background:#e67e22; color:white;" onclick="startBattle('family')">👨‍👩‍👧 Family</button>
            <button class="btn" style="background:#e67e22; color:white;" onclick="startBattle('verbs')">🏃 Verbs</button>
        </div>
    </div>

    <div id="battle-screen" class="arena-container hidden">
        <div class="arena">
            <div class="bonus-badge" id="bonus-1">⚡ FAST FINISH! +50</div>
            <h2 id="name-1" style="color:#ff4757; margin:0;"></h2>
            <div class="score" id="score-1">0</div>
            <img id="img-1" class="q-img">
            <p id="text-1" style="font-size:1.4rem; font-weight:bold; height:60px;"></p>
            <input type="text" id="input-1" class="ans-in" autocomplete="off" oninput="check(1)">
        </div>
        <div class="arena">
            <div class="bonus-badge" id="bonus-2">⚡ FAST FINISH! +50</div>
            <h2 id="name-2" style="color:var(--accent); margin:0;"></h2>
            <div class="score" id="score-2">0</div>
            <img id="img-2" class="q-img">
            <p id="text-2" style="font-size:1.4rem; font-weight:bold; height:60px;"></p>
            <input type="text" id="input-2" class="ans-in" autocomplete="off" oninput="check(2)">
        </div>
    </div>

    <div id="win-screen" class="box hidden">
        <h1 id="winner-text" style="color:var(--gold); font-size:4rem;"></h1>
        <div style="display: flex; align-items: flex-end; justify-content: center; gap: 20px; margin-top: 30px;">
            <div style="width:160px; height:150px; background:#bdc3c7; border-radius:15px; color:#010a24; padding:15px;">
                <div id="silver-name"></div><div id="silver-score" style="font-size:2rem;"></div><div>🥈</div>
            </div>
            <div style="width:180px; height:220px; background:#ffd700; border-radius:15px; color:#010a24; padding:15px; box-shadow: 0 0 30px #f1c40f;">
                <div id="gold-name"></div><div id="gold-score" style="font-size:2.5rem;"></div><div>👑</div>
            </div>
        </div>
        <button class="btn" onclick="location.reload()" style="margin-top:40px;">NEW BATTLE 🔄</button>
    </div>
</div>

<script>
    const quizData = {
        animals: [{q:"elephant", s:"Big trunk", i:"https://images.unsplash.com/photo-1557050543-4d5f4e07ef46?w=400"}, {q:"lion", s:"King of jungle", i:"https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=400"}],
        fruits: [{q:"apple", s:"Red fruit", i:"https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?w=400"}],
        school: [{q:"pencil", s:"To write", i:"
