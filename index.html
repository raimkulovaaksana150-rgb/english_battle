<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>English Speed Battle - Aksana Tukubai kyzy</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --dark: #010a24; --red: #ff4757; --green: #2ecc71; --accent: #00d4ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; }
        .sidebar { width: 280px; background: #051937; border-right: 3px solid var(--gold); height: 100vh; position: fixed; left: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; text-align: center; z-index: 10; }
        .profile-img { width: 130px; height: 130px; background: #fff; border-radius: 50%; border: 4px solid var(--gold); overflow: hidden; margin-bottom: 15px; }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }
        .main-stage { margin-left: 280px; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        .box { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; text-align: center; width: 850px; border: 2px solid var(--gold); backdrop-filter: blur(10px); }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
        .arena-container { display: flex; width: 95%; gap: 20px; height: 90vh; }
        .arena { flex: 1; background: rgba(0,0,0,0.6); border: 2px solid var(--gold); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: space-around; }
        .q-img { max-width: 250px; max-height: 220px; object-fit: contain; margin-bottom: 10px; background: white; border-radius: 15px; padding: 10px; }
        .score { font-size: 4rem; color: var(--gold); font-weight: bold; }
        .ans-in { width: 85%; padding: 15px; font-size: 2rem; text-align: center; border-radius: 12px; border: 4px solid #fff; outline: none; background: white; color: black; }
        .wrong { border-color: var(--red) !important; background: #ffcccc !important; animation: shake 0.3s; }
        .correct { border-color: var(--green) !important; background: #e6ffed !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .btn { padding: 15px; background: var(--gold); border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.2rem; color: #010a24; width: 100%; transition: 0.2s; }
        .btn:hover { background: #f39c12; }
    </style>
</head>
<body>

<audio id="bgMusic" loop preload="auto">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
</audio>

<div class="sidebar">
    <div class="profile-img"><img src="96064.jpg" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1995/1995539.png'"></div>
    <h3 style="margin: 10px 0;">Аксана Тукубай кызы</h3>
    <p style="color:var(--accent); font-weight: bold; font-size: 0.9rem;">Кеңеш жалпы орто билим берүү мектеби</p>
    <p style="color:var(--gold); margin-top: 20px; font-weight: bold;">MASTER CLASS 2026</p>
</div>

<div class="main-stage">
    <div id="setup-screen" class="box">
        <h1 style="color:var(--gold); letter-spacing: 2px;">ENTER YOUR TEAM NAME</h1>
        <div style="display:flex; gap:20px; margin: 30px 0;">
            <input type="text" id="t1" value="TEAM A" style="flex:1; padding:15px; font-size:1.5rem; text-align:center; border-radius:10px; border:none;">
            <input type="text" id="t2" value="TEAM B" style="flex:1; padding:15px; font-size:1.5rem; text-align:center; border-radius:10px; border:none;">
        </div>
        <button class="btn" style="width: 250px;" onclick="openMenu()">CONTINUE</button>
    </div>

    <div id="menu-screen" class="box hidden">
        <h2 style="color:var(--gold);">CHOOSE TOPIC</h2>
        <div class="menu-grid">
            <button class="btn" onclick="start('animals')">🦁 Animals</button>
            <button class="btn" onclick="start('fruits')">🍎 Fruits</button>
            <button class="btn" onclick="start('school')">🎒 School Items</button>
            <button class="btn" onclick="start('verbs')">🏃 Action Verbs</button>
            <button class="btn" onclick="start('colors')">🎨 Colors</button>
            <button class="btn" onclick="start('family')">👨‍👩‍👧 Family</button>
            <button class="btn" onclick="start('body')">🦴 Body Parts</button>
            <button class="btn" onclick="start('clothes')">👕 Clothes</button>
        </div>
    </div>

    <div id="battle-screen" class="arena-container hidden">
        <div class="arena">
            <h2 id="name-1" style="color:#ff4757;"></h2>
            <div class="score" id="score-1">0</div>
            <img id="img-1" class="q-img" src="">
            <input type="text" id="input-1" class="ans-in" onkeydown="handleEnter(event, 1)" placeholder="Type & Enter" autocomplete="off">
        </div>
        <div class="arena">
            <h2 id="name-2" style="color:#00d4ff;"></h2>
            <div class="score" id="score-2">0</div>
            <img id="img-2" class="q-img" src="">
            <input type="text" id="input-2" class="ans-in" onkeydown="handleEnter(event, 2)" placeholder="Type & Enter" autocomplete="off">
        </div>
    </div>

    <div id="win-screen" class="box hidden">
        <h1 id="winner-text" style="color:var(--gold); font-size:4rem;"></h1>
        <button class="btn" style="width: 250px;" onclick="location.reload()">PLAY AGAIN</button>
    </div>
</div>

<script>

            {q:"monkey", i:"https://cdn-icons-png.flaticon.com/512/616/616432.png"}, {q:"zebra", i:"https://cdn-icons-png.flaticon.com/512/3069/3069156.png"},
            {q:"tiger", i:"https://cdn-icons-png.flaticon.com/512/616/616416.png"}, {q:"panda", i:"https://cdn-icons-png.flaticon.com/512/2311/2311038.png"},

            {q:"orange", i:"https://cdn-icons-png.flaticon.com/512/1728/1728765.png"}, {q:"grapes", i:"https://cdn-icons-png.flaticon.com/512/1155/1155252.png"},

            {q:"cherry", i:"https://cdn-icons-png.flaticon.com/512/2311/2311029.png"}, {q:"kiwi", i:"https://cdn-icons-png.flaticon.com/512/1728/1728731.png"},
            {q:"mango", i:"https://cdn-icons-png.flaticon.com/512/2909/2909836.png"}, {q:"pineapple", i:"https://cdn-icons-png.flaticon.com/512/1155/1155260.png"},

            {q:"pen", i:"https://cdn-icons-png.flaticon.com/512/1250/1250615.png"}, {q:"pencil", i:"https://cdn-icons-png.flaticon.com/512/1250/1250614.png"},
            {q:"book", i:"https://cdn-icons-png.flaticon.com/512/2232/2232688.png"}, {q:"bag", i:"https://cdn-icons-png.flaticon.com/512/2990/2990008.png"},
            {q:"ruler", i:"https://cdn-icons-png.flaticon.com/512/567/567222.png"}, {q:"eraser", i:"https://cdn-icons-png.flaticon.com/512/2301/2301213.png"},
            {q:"desk", i:"https://cdn-icons-png.flaticon.com/512/3038/3038101.png"}, {q:"map", i:"https://cdn-icons-png.flaticon.com/512/854/854878.png"},
            {q:"glue", i:"https://cdn-icons-png.flaticon.com/512/3062/3062325.png"}, {q:"notebook", i:"https://cdn-icons-png.flaticon.com/512/1183/1183794.png"},
            {q:"paper", i:"https://cdn-icons-png.flaticon.com/512/2541/2541991.png"}, {q:"sharpener", i:"https://cdn-icons-png.flaticon.com/512/3426/3426500.png"}
        ],
        verbs: [
            {q:"run", i:"https://cdn-icons-png.flaticon.com/512/1946/1946450.png"}, {q:"swim", i:"https://cdn-icons-png.flaticon.com/512/1261/1261621.png"},
            {q:"jump", i:"https://cdn-icons-png.flaticon.com/512/2165/2165215.png"}, {q:"read", i:"https://cdn-icons-png.flaticon.com/512/2436/2436633.png"},
            {q:"sleep", i:"https://cdn-icons-png.flaticon.com/512/3011/3011124.png"}, {q:"eat", i:"https://cdn-icons-png.flaticon.com/512/3081/3081919.png"},
            {q:"drink", i:"https://cdn-icons-png.flaticon.com/512/3100/3100558.png"}, {q:"sing", i:"https://cdn-icons-png.flaticon.com/512/2165/2165251.png"},
            {q:"dance", i:"https://cdn-icons-png.flaticon.com/512/2165/2165181.png"}, {q:"draw", i:"https://cdn-icons-png.flaticon.com/512/1048/1048953.png"},
            {q:"fly", i:"https://cdn-icons-png.flaticon.com/512/2165/2165241.png"}, {q:"write", i:"https://cdn-icons-png.flaticon.com/512/1162/1162744.png"}
        ],
        colors: [
            {q:"red", i:"https://cdn-icons-png.flaticon.com/512/1155/1155255.png"}, {q:"blue", i:"https://cdn-icons-png.flaticon.com/512/1155/1155258.png"},
            {q:"green", i:"https://cdn-icons-png.flaticon.com/512/1155/1155257.png"}, {q:"yellow", i:"https://cdn-icons-png.flaticon.com/512/1155/1155261.png"},
            {q:"black", i:"https://cdn-icons-png.flaticon.com/512/1155/1155254.png"}, {q:"white", i:"https://cdn-icons-png.flaticon.com/512/1155/1155253.png"},
            {q:"pink", i:"https://cdn-icons-png.flaticon.com/512/1155/1155259.png"}, {q:"purple", i:"https://cdn-icons-png.flaticon.com/512/1155/1155262.png"},
            {q:"orange", i:"https://cdn-icons-png.flaticon.com/512/1155/1155263.png"}, {q:"brown", i:"https://cdn-icons-png.flaticon.com/512/1155/1155256.png"},
            {q:"grey", i:"https://cdn-icons-png.flaticon.com/512/1155/1155265.png"}, {q:"gold", i:"https://cdn-icons-png.flaticon.com/512/1155/1155266.png"}
        ],
        family: [
            {q:"father", i:"https://cdn-icons-png.flaticon.com/512/4140/4140047.png"}, {q:"mother", i:"https://cdn-icons-png.flaticon.com/512/4140/4140048.png"},
            {q:"baby", i:"https://cdn-icons-png.flaticon.com/512/4140/4140051.png"}, {q:"brother", i:"https://cdn-icons-png.flaticon.com/512/4140/4140052.png"},
            {q:"sister", i:"https://cdn-icons-png.flaticon.com/512/4140/4140053.png"}, {q:"grandpa", i:"https://cdn-icons-png.flaticon.com/512/4140/4140054.png"},
            {q:"grandma", i:"https://cdn-icons-png.flaticon.com/512/4140/4140055.png"}, {q:"son", i:"https://cdn-icons-png.flaticon.com/512/4140/4140056.png"},
            {q:"daughter", i:"https://cdn-icons-png.flaticon.com/512/4140/4140057.png"}, {q:"uncle", i:"https://cdn-icons-png.flaticon.com/512/4140/4140058.png"},
            {q:"aunt", i:"https://cdn-icons-png.flaticon.com/512/4140/4140059.png"}, {q:"family", i:"https://cdn-icons-png.flaticon.com/512/4140/4140060.png"}
        ],
        body: [
            {q:"eye", i:"https://cdn-icons-png.flaticon.com/512/2990/2990145.png"}, {q:"nose", i:"https://cdn-icons-png.flaticon.com/512/2990/2990146.png"},
            {q:"hand", i:"https://cdn-icons-png.flaticon.com/512/2990/2990147.png"}, {q:"leg", i:"https://cdn-icons-png.flaticon.com/512/2990/2990148.png"},
            {q:"ear", i:"https://cdn-icons-png.flaticon.com/512/2990/2990149.png"}, {q:"mouth", i:"https://cdn-icons-png.flaticon.com/512/2990/2990150.png"},
            {q:"teeth", i:"https://cdn-icons-png.flaticon.com/512/2990/2990151.png"}, {q:"hair", i:"https://cdn-icons-png.flaticon.com/512/2990/2990152.png"},
            {q:"arm", i:"https://cdn-icons-png.flaticon.com/512/2990/2990153.png"}, {q:"knee", i:"https://cdn-icons-png.flaticon.com/512/2990/2990154.png"},
            {q:"finger", i:"https://cdn-icons-png.flaticon.com/512/2990/2990155.png"}, {q:"face", i:"https://cdn-icons-png.flaticon.com/512/2990/2990156.png"}
        ],
        clothes: [
            {q:"t-shirt", i:"https://cdn-icons-png.flaticon.com/512/863/863684.png"}, {q:"pants", i:"https://cdn-icons-png.flaticon.com/512/2912/2912521.png"},
            {q:"dress", i:"https://cdn-icons-png.flaticon.com/512/1785/1785255.png"}, {q:"hat", i:"https://cdn-icons-png.flaticon.com/512/1051/1051469.png"},
            {q:"shoes", i:"https://cdn-icons-png.flaticon.com/512/2553/2553818.png"}, {q:"skirt", i:"https://cdn-icons-png.flaticon.com/512/3258/3258170.png"},
            {q:"socks", i:"https://cdn-icons-png.flaticon.com/512/115/115984.png"}, {q:"jacket", i:"https://cdn-icons-png.flaticon.com/512/2784/2784386.png"},
            {q:"shirt", i:"https://cdn-icons-png.flaticon.com/512/2503/2503380.png"}, {q:"cap", i:"https://cdn-icons-png.flaticon.com/512/732/732551.png"},
            {q:"gloves", i:"https://cdn-icons-png.flaticon.com/512/862/862837.png"}, {q:"scarf", i:"https://cdn-icons-png.flaticon.com/512/3258/3258164.png"}
        ]
    };

    let p1L, p2L, p1I, p2I, s1, s2;

    function openMenu() {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('menu-screen').classList.remove('hidden');
    }

    function start(topic) {
        document.getElementById('bgMusic').play().catch(() => {});
        p1L = [...quizData[topic]].sort(()=>Math.random()-0.5);
        p2L = [...quizData[topic]].sort(()=>Math.random()-0.5);
        p1I = 0; p2I = 0; s1 = 0; s2 = 0;
        document.getElementById('name-1').innerText = document.getElementById('t1').value;
        document.getElementById('name-2').innerText = document.getElementById('t2').value;
        document.getElementById('score-1').innerText = 0;
        document.getElementById('score-2').innerText = 0;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('battle-screen').classList.remove('hidden');
        load(1); load(2);
    }

    function load(p) {
        let list = (p==1) ? p1L : p2L;
        let idx = (p==1) ? p1I : p2I;
        if(idx >= list.length) {
            if(p1I >= p1L.length && p2I >= p2L.length) finish();
            return;
        }
        document.getElementById('img-'+p).src = list[idx].i;
        let inp = document.getElementById('input-'+p);
        inp.value = ""; inp.className = "ans-in"; inp.disabled = false;
        if(p==1) inp.focus();
    }

    function handleEnter(event, p) { if (event.key === "Enter") check(p); }

    function check(p) {
        let inp = document.getElementById('input-'+p);
        let val = inp.value.toLowerCase().trim();
        let list = (p==1) ? p1L : p2L;
        let idx = (p==1) ? p1I : p2I;
        if (idx >= list.length) return;
        
        inp.disabled = true;
        if (val === list[idx].q) {
            inp.classList.add('correct');
            if(p==1) { s1+=10; p1I++; document.getElementById('score-1').innerText = s1; }
            else { s2+=10; p2I++; document.getElementById('score-2').innerText = s2; }
        } else {
            inp.classList.add('wrong');
            if(p==1) p1I++; else p2I++; 
        }
        setTimeout(() => load(p), 500);
    }

    function finish() {
        document.getElementById('bgMusic').pause();
        document.getElementById('battle-screen').classList.add('hidden');
        document.getElementById('win-screen').classList.remove('hidden');
        let n1 = document.getElementById('t1').value;
        let n2 = document.getElementById('t2').value;
        document.getElementById('winner-text').innerText = s1 > s2 ? n1 + " WINS! 🏆" : (s2 > s1 ? n2 + " WINS! 🏆" : "DRAW! 🤝");
        confetti({ particleCount: 150, spread: 70 });
    }
</script>
</body>
</html>
