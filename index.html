<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>English Speed Battle - Aksana Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --dark: #010a24; --red: #ff4757; --green: #2ecc71; --accent: #00d4ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; }
        .sidebar { width: 280px; background: #051937; border-right: 3px solid var(--gold); height: 100vh; position: fixed; left: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; text-align: center; z-index: 10; }
        .profile-img { width: 130px; height: 130px; background: #fff; border-radius: 50%; border: 4px solid var(--gold); overflow: hidden; margin-bottom: 15px; }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }
        .main-stage { margin-left: 280px; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        .box { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; text-align: center; width: 850px; border: 2px solid var(--gold); backdrop-filter: blur(15px); }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 25px; }
        .arena-container { display: flex; width: 95%; gap: 20px; height: 90vh; }
        .arena { flex: 1; background: rgba(255,255,255,0.07); border: 2px solid var(--gold); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: space-around; }
        .q-img { max-width: 220px; height: 200px; object-fit: contain; margin-bottom: 15px; background: white; border-radius: 15px; padding: 10px; }
        .score { font-size: 5rem; color: var(--gold); font-weight: bold; }
        .ans-in { width: 85%; padding: 15px; font-size: 2rem; text-align: center; border-radius: 12px; border: 4px solid #fff; outline: none; background: white; color: black; }
        .wrong { border-color: var(--red) !important; background: #ffcccc !important; animation: shake 0.4s; }
        .correct { border-color: var(--green) !important; background: #e6ffed !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .btn { padding: 15px; background: var(--gold); border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.2rem; color: #010a24; width: 100%; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="profile-img"><img src="96064.jpg" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1995/1995539.png'"></div>
    <h3 style="margin: 10px 0;">Аксана Тукубай кызы</h3>
    <p style="color:var(--accent); font-weight: bold;">Кеңеш жалпы орто билим берүү мектеби</p>
    <p style="color:var(--gold); margin-top: 20px; font-weight: bold;">MASTER CLASS 2026</p>
</div>

<div class="main-stage">
    <div id="setup-screen" class="box">
        <h1 style="color:var(--gold);">ENTER TEAM NAMES</h1>
        <div style="display:flex; gap:20px; margin-bottom: 30px;">
            <input type="text" id="t1" value="LIONS" style="flex:1; padding:15px; font-size:1.5rem; text-align:center;">
            <input type="text" id="t2" value="EAGLES" style="flex:1; padding:15px; font-size:1.5rem; text-align:center;">
        </div>
        <button class="btn" onclick="showMenu()">START GAME</button>
    </div>

    <div id="menu-screen" class="box hidden">
        <h2 style="color:var(--gold);">CHOOSE TOPIC</h2>
        <div class="menu-grid">
            <button class="btn" onclick="startBattle('animals')">🦁 Animals</button>
            <button class="btn" onclick="startBattle('fruits')">🍎 Fruits</button>
            <button class="btn" onclick="startBattle('school')">🎒 School</button>
            <button class="btn" onclick="startBattle('body')">🦴 Body Parts</button>
        </div>
    </div>

    <div id="battle-screen" class="arena-container hidden">
        <div class="arena">
            <h2 id="name-1"></h2>
            <div class="score" id="score-1">0</div>
            <img id="img-1" class="q-img">
            <input type="text" id="input-1" class="ans-in" onkeydown="if(event.key==='Enter') check(1)" placeholder="Type & Enter" autocomplete="off">
        </div>
        <div class="arena">
            <h2 id="name-2"></h2>
            <div class="score" id="score-2">0</div>
            <img id="img-2" class="q-img">
            <input type="text" id="input-2" class="ans-in" onkeydown="if(event.key==='Enter') check(2)" placeholder="Type & Enter" autocomplete="off">
        </div>
    </div>

    <div id="win-screen" class="box hidden">
        <h1 id="winner-text" style="color:var(--gold); font-size: 4rem;"></h1>
        <button class="btn" style="width: 300px;" onclick="location.reload()">RESTART</button>
    </div>
</div>

<script>
    const data = {
        animals: [
            {q:"lion", i:"https://cdn-icons-png.flaticon.com/512/616/616412.png"}, {q:"tiger", i:"https://cdn-icons-png.flaticon.com/512/616/616416.png"},
            {q:"zebra", i:"https://cdn-icons-png.flaticon.com/512/3069/3069156.png"}, {q:"elephant", i:"https://cdn-icons-png.flaticon.com/512/616/616430.png"},
            {q:"monkey", i:"https://cdn-icons-png.flaticon.com/512/616/616432.png"}, {q:"panda", i:"https://cdn-icons-png.flaticon.com/512/2311/2311038.png"},
            {q:"fox", i:"https://cdn-icons-png.flaticon.com/512/616/616438.png"}, {q:"rabbit", i:"https://cdn-icons-png.flaticon.com/512/616/616444.png"},
            {q:"bear", i:"https://cdn-icons-png.flaticon.com/512/616/616424.png"}, {q:"wolf", i:"https://cdn-icons-png.flaticon.com/512/616/616441.png"}
        ],
        fruits: [
            {q:"apple", i:"https://cdn-icons-png.flaticon.com/512/415/415682.png"}, {q:"banana", i:"https://cdn-icons-png.flaticon.com/512/2909/2909761.png"},
            {q:"orange", i:"https://cdn-icons-png.flaticon.com/512/1728/1728765.png"}, {q:"grapes", i:"https://cdn-icons-png.flaticon.com/512/1155/1155252.png"},
            {q:"lemon", i:"https://cdn-icons-png.flaticon.com/512/1423/1423146.png"}, {q:"pear", i:"https://cdn-icons-png.flaticon.com/512/3137/3137022.png"},
            {q:"strawberry", i:"https://cdn-icons-png.flaticon.com/512/590/590685.png"}, {q:"watermelon", i:"https://cdn-icons-png.flaticon.com/512/2909/2909804.png"}
        ],
        school: [
            {q:"pen", i:"https://cdn-icons-png.flaticon.com/512/1250/1250615.png"}, {q:"pencil", i:"https://cdn-icons-png.flaticon.com/512/1250/1250614.png"},
            {q:"book", i:"https://cdn-icons-png.flaticon.com/512/2232/2232688.png"}, {q:"bag", i:"https://cdn-icons-png.flaticon.com/512/2990/2990008.png"},
            {q:"ruler", i:"https://cdn-icons-png.flaticon.com/512/567/567222.png"}, {q:"eraser", i:"https://cdn-icons-png.flaticon.com/512/2301/2301213.png"},
            {q:"copybook", i:"https://cdn-icons-png.flaticon.com/512/2641/2641525.png"}
        ],
        body: [
            {q:"eye", i:"https://cdn-icons-png.flaticon.com/512/2990/2990145.png"}, {q:"nose", i:"https://cdn-icons-png.flaticon.com/512/2990/2990146.png"},
            {q:"hand", i:"https://cdn-icons-png.flaticon.com/512/2990/2990147.png"}, {q:"ear", i:"https://cdn-icons-png.flaticon.com/512/2990/2990149.png"},
            {q:"mouth", i:"https://cdn-icons-png.flaticon.com/512/2990/2990150.png"}
        ]
    };

    let p1L, p2L, p1I=0, p2I=0, s1=0, s2=0;

    function showMenu() {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('menu-screen').classList.remove('hidden');
    }

    function startBattle(topic) {
        p1L = [...data[topic]].sort(()=>Math.random()-0.5);
        p2L = [...data[topic]].sort(()=>Math.random()-0.5);
        document.getElementById('name-1').innerText = document.getElementById('t1').value;
        document.getElementById('name-2').innerText = document.getElementById('t2').value;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('battle-screen').classList.remove('hidden');
        load(1); load(2);
    }

    function load(p) {
        let list = (p===1) ? p1L : p2L;
        let idx = (p===1) ? p1I : p2I;
        if(idx >= list.length) {
            if(p1I >= p1L.length && p2I >= p2L.length) finish();
            return;
        }
        document.getElementById('img-'+p).src = list[idx].i;
        let inp = document.getElementById('input-'+p);
        inp.value = ""; inp.className = "ans-in";
        inp.disabled = false;
        if(p===1) inp.focus();
    }

    function check(p) {
        let inp = document.getElementById('input-'+p);
        let val = inp.value.toLowerCase().trim();
        let list = (p===1) ? p1L : p2L;
        let idx = (p===1) ? p1I : p2I;

        if(val === list[idx].q) {
            inp.classList.add('correct');
            if(p===1) { s1+=10; p1I++; document.getElementById('score-1').innerText = s1; }
            else { s2+=10; p2I++; document.getElementById('score-2').innerText = s2; }
            inp.disabled = true;
            setTimeout(() => load(p), 300);
        } else {
            // ЭГЕР КАТА БОЛСО - КЫЗАРЫП ЖАНА КИЙИНКИГЕ ӨТӨТ
            inp.classList.add('wrong');
            inp.disabled = true;
            if(p===1) p1I++; else p2I++;
            setTimeout(() => load(p), 500);
        }
    }

    function finish() {
        document.getElementById('battle-screen').classList.add('hidden');
        document.getElementById('win-screen').classList.remove('hidden');
        let t1 = document.getElementById('t1').value;
        let t2 = document.getElementById('t2').value;
        document.getElementById('winner-text').innerText = s1 > s2 ? t1 + " WINS! 🏆" : (s2 > s1 ? t2 + " WINS! 🏆" : "DRAW! 🤝");
        confetti({ particleCount: 200, spread: 100 });
    }
</script>
</body>
</html>
