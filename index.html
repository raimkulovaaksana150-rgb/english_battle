<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>English Battle - Aksana</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --dark: #010a24; --accent: #00d4ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; }
        .sidebar { width: 280px; background: #051937; border-right: 4px solid var(--gold); height: 100vh; position: fixed; left: 0; display: flex; flex-direction: column; align-items: center; padding: 20px 10px; z-index: 10; text-align: center; }
        .profile-img { width: 120px; height: 120px; background: #fff; border-radius: 50%; border: 3px solid var(--gold); overflow: hidden; margin-bottom: 15px; }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }
        .school-name { color: var(--accent); font-weight: bold; font-size: 1rem; margin-top: 5px; }
        .teacher-name { font-weight: bold; color: #fff; font-size: 1.2rem; margin: 5px 0; }
        .main-stage { margin-left: 280px; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        .box { background: rgba(255,255,255,0.08); padding: 25px; border-radius: 20px; text-align: center; width: 800px; border: 1px solid var(--gold); backdrop-filter: blur(10px); }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
        .arena-container { display: flex; width: 98%; gap: 10px; height: 95vh; padding: 10px; }
        .arena { flex: 1; background: rgba(0,0,0,0.6); border: 2px solid var(--gold); border-radius: 20px; padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; position: relative; }
        .q-img { width: 100%; height: 240px; object-fit: cover; border-radius: 12px; border: 2px solid white; }
        .score { font-size: 3rem; color: var(--gold); font-weight: bold; margin: 0; }
        .ans-in { width: 85%; padding: 12px; font-size: 1.6rem; text-align: center; border-radius: 10px; border: 3px solid #fff; outline: none; font-weight: bold; }
        .ans-in.correct { background: #2ecc71 !important; color: white; }
        .btn { padding: 12px; background: var(--gold); border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: #010a24; transition: 0.2s; }
        .btn:hover { transform: scale(1.03); }
        .bonus-badge { position: absolute; top: 10px; right: 10px; background: #ff4757; color: white; padding: 5px 10px; border-radius: 5px; font-weight: bold; display: none; }
    </style>
</head>
<body>
<audio id="correct-sound" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>

<div class="sidebar">
    <div class="profile-img"><img src="96064.jpg" onerror="this.src='https://img.icons8.com/bubbles/200/teacher.png'"></div>
    <p class="teacher-name">Aksana Tukubai kyzy</p>
    <p class="school-name">Kenesh General School</p>
    <hr style="width: 80%; border: 0.5px solid var(--gold); opacity: 0.3; margin: 20px 0;">
</div>

<div class="main-stage">
    <div id="setup-screen" class="box">
        <h1 style="color:var(--gold);">BATTLE REGISTRATION</h1>
        <div style="margin: 20px; display: flex; justify-content: center; gap: 15px;">
            <input type="text" id="t1" value="LIONS" style="padding:12px; font-size:1.2rem; width: 40%;">
            <input type="text" id="t2" value="EAGLES" style="padding:12px; font-size:1.2rem; width: 40%;">
        </div>
        <button class="btn" style="width: 180px;" onclick="openMenu()">CONTINUE</button>
    </div>

    <div id="menu-screen" class="box hidden">
        <h2 style="color:var(--gold);">CHOOSE TOPIC</h2>
        <div class="menu-grid" id="menu-grid"></div>
    </div>
