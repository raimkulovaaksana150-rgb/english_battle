<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>English Speed Battle</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --dark: #010a24; --red: #ff4757; --green: #2ecc71; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; }
        .sidebar { width: 260px; background: #051937; border-right: 3px solid var(--gold); height: 100vh; position: fixed; left: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; text-align: center; }
        .profile-img { width: 120px; height: 120px; background: #fff; border-radius: 50%; border: 4px solid var(--gold); overflow: hidden; margin-bottom: 10px; }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }
        .main-stage { margin-left: 260px; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .box { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; text-align: center; width: 80%; border: 2px solid var(--gold); }
        .hidden { display: none !important; }
        .arena-container { display: flex; width: 95%; gap: 20px; height: 80vh; }
        .arena { flex: 1; background: rgba(0,0,0,0.5); border: 2px solid var(--gold); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: space-around; }
        .q-img { max-width: 200px; height: 180px; object-fit: contain; background: white; border-radius: 10px; padding: 10px; }
        .ans-in { width: 80%; padding: 15px; font-size: 1.8rem; text-align: center; border-radius: 10px; border: 3px solid white; outline: none; }
        .btn { padding: 15px 30px; background: var(--gold); border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.2rem; margin: 5px; }
        .score { font-size: 3rem; color: var(--gold); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="profile-img"><img src="96064.jpg" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1995/1995539.png'"></div>
    <h3>Аксана Тукубай кызы</h3>
    <p style="color:#00d4ff; font-weight: bold;">Кеңеш жалпы орто билим берүү мектеби</p>
    <p style="color:var(--gold); margin-top: 20px;">MASTER CLASS 2026</p>
</div>

<div class="main-stage">
    <div id="setup-screen" class="box">
        <h1 style="color:var(--gold);">ENTER YOUR TEAM NAME</h1>
        <input type="text" id="t1" value="TEAM A" style="padding:15px; font-size:1.2rem; margin: 10px; border-radius: 10px;">
        <input type="text" id="t2" value="TEAM B" style="padding:15px; font-size:1.2rem; margin: 10px; border-radius: 10px;"><br>
        <button class="btn" onclick="showMenu()">CONTINUE</button>
    </div>

    <div id="menu-screen" class="box hidden">
        <h2 style="color:var(--gold);">CHOOSE TOPIC</h2>
        <button class="btn" onclick="startGame('animals')">Animals</button>
        <button class="btn" onclick="startGame('fruits')">Fruits</button>
        <button class="btn" onclick="startGame('school')">School</button>
    </div>

    <div id="battle-screen" class="arena-container hidden">
        <div class="arena">
            <h2 id="name-1"></h2>
            <div class="score" id="score-1">0</div>
            <img id="img-1" class="q-img">
            <input type="text" id="input-1" class="ans-in" onkeydown="if(event.key==='Enter') check(1)" placeholder="Type & Enter">
        </div>
        <div class="arena">
            <h2 id="name-2"></h2>
            <div class="score" id="score-2">0</div>
            <img id="img-2" class="q-img">
            <input type="text" id="input-2" class="ans-in" onkeydown="if(event.key==='Enter') check(2)" placeholder="Type & Enter">
        </div>
    </div>

    <div id="win-screen" class="box hidden">
        <h1 id="winner-text"></h1>
        <button class="btn" onclick="location.reload()">RESTART</button>
    </div>
</div>

<script>
    const data = {
        animals: [{q:"lion", i:"https://cdn-icons-png.flaticon.com/512/616/616412.png"}, {q:"tiger", i:"https://cdn-icons-png.flaticon.com/512/616/616416.png"}, {q:"cat", i:"https://cdn-icons-png.flaticon.com/512/616/616430.png"}],
        fruits: [{q:"apple", i:"https://cdn-icons-png.flaticon.com/512/415/415682.png"}, {q:"banana", i:"https://cdn-icons-png.flaticon.com/512/2909/2909761.png"}, {q:"grapes", i:"https://cdn-icons-png.flaticon.com/512/1155/1155252.png"}],
        school: [{q:"pen", i:"https://cdn-icons-png.flaticon.com/512/1250/1250615.png"}, {q:"pencil", i:"https://cdn-icons-png.flaticon.com/512/1250/1250614.png"}, {q:"book", i:"https://cdn-icons-png.flaticon.com/512/2232/2232688.png"}]
    };

    let p1List, p2List, p1Idx=0, p2Idx=0, s1=0, s2=0;

    function showMenu() {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('menu-screen').classList.remove('hidden');
    }

    function startGame(topic) {
        p1List = [...data[topic]].sort(()=>Math.random()-0.5);
        p2List = [...data[topic]].sort(()=>Math.random()-0.5);
        document.getElementById('name-1').innerText = document.getElementById('t1').value;
        document.getElementById('name-2').innerText = document.getElementById('t2').value;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('battle-screen').classList.remove('hidden');
        draw(1); draw(2);
    }

    function draw(p) {
        let list = p===1 ? p1List : p2List;
        let idx = p===1 ? p1Idx : p2Idx;
        if(idx >= list.length) {
            if(p1Idx >= p1List.length && p2Idx >= p2List.length) finish();
            return;
        }
        document.getElementById('img-'+p).src = list[idx].i;
        document.getElementById('input-'+p).value = "";
        document.getElementById('input-'+p).style.borderColor = "white";
    }

    function check(p) {
        let inp = document.getElementById('input-'+p);
        let val = inp.value.toLowerCase().trim();
        let list = p===1 ? p1List : p2List;
        let idx = p===1 ? p1Idx : p2Idx;

        if(val === list[idx].q) {
            if(p===1) { s1+=10; p1Idx++; document.getElementById('score-1').innerText = s1; }
            else { s2+=10; p2Idx++; document.getElementById('score-2').innerText = s2; }
            draw(p);
        } else {
            inp.style.borderColor = "red";
            setTimeout(() => { inp.style.borderColor = "white"; }, 500);
        }
    }

    function finish() {
        document.getElementById('battle-screen').classList.add('hidden');
        document.getElementById('win-screen').classList.remove('hidden');
        document.getElementById('winner-text').innerText = s1 > s2 ? "WINNER: " + document.getElementById('t1').value : "WINNER: " + document.getElementById('t2').value;
        confetti();
    }
</script>
</body>
</html>
