<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Universe - Kenesh Education School</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --blue: #45a29e; --red: #e74c3c; --purple: #8e44ad; --dark: #0b0c10; }
        body { font-family: 'Arial Black', sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; }
        
        .sidebar { width: 250px; background: #1f2833; border-right: 3px solid var(--gold); height: 100vh; float: left; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--gold); object-fit: cover; }

        .main-stage { margin-left: 250px; height: 100vh; position: relative; overflow-y: auto; background: radial-gradient(circle, #1f2833, #0b0c10); }
        .hidden { display: none !important; }

        /* MENU */
        .section-title { color: var(--gold); font-size: 1.5rem; text-align: center; margin-top: 30px; text-transform: uppercase; border-bottom: 2px solid var(--gold); display: inline-block; padding: 0 20px; }
        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 30px; }
        .topic-btn { padding: 20px; border-radius: 12px; border: none; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px #000; font-size: 0.8rem; }
        .topic-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* BATTLE */
        .timer-box { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 80px; height: 80px; z-index: 10; }
        .timer-svg { transform: rotate(-90deg); width: 80px; height: 80px; }
        .timer-circle { fill: none; stroke: var(--gold); stroke-width: 8; stroke-dasharray: 251; stroke-dashoffset: 0; transition: 0.1s linear; }
        
        .battle-zone { display: flex; justify-content: space-around; align-items: center; height: 85vh; padding: 0 20px; }
        .arena { width: 45%; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 25px; border: 2px solid var(--gold); text-align: center; }
        .q-img { width: 100%; height: 230px; border-radius: 15px; object-fit: cover; border: 2px solid white; margin-bottom: 15px; }
        .ans-in { width: 85%; padding: 15px; border-radius: 10px; font-size: 2rem; text-align: center; border: none; font-weight: bold; }

        /* PODIUM (RESULTS) */
        #win-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .podium-container { display: flex; align-items: flex-end; gap: 30px; height: 300px; margin-top: 50px; }
        .podium-bar { width: 150px; border-radius: 15px 15px 0 0; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 20px; transition: height 1s ease-out; }
        .podium-1 { background: linear-gradient(to top, #f1c40f, #f39c12); height: 0; }
        .podium-2 { background: linear-gradient(to top, #bdc3c7, #95a5a6); height: 0; }
        .score-tag { position: absolute; top: -50px; font-size: 1.5rem; color: var(--gold); font-weight: bold; }
        .team-label { position: absolute; bottom: -40px; font-size: 1.5rem; width: 100%; text-align: center; }
    </style>
</head>
<body>

    <div class="sidebar">
        <img src="96064.jpg" class="profile-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/194/194931.png'">
        <h3 style="text-align: center; font-size: 0.9rem; margin: 15px 0;">Tukubai kyzy Aksana</h3>
        <p style="color: var(--gold); font-size: 0.7rem;">English Teacher</p>
        <div style="margin-top: auto; color: #45a29e; font-size: 0.7rem;">Kenesh Education School</div>
    </div>

    <div class="main-stage">
        <div id="home-screen">
            <h1 style="text-align: center; font-size: 3rem; color: var(--gold); margin: 30px 0;">ENGLISH UNIVERSE</h1>
            <center><div class="section-title">📘 Vocabulary</div></center>
            <div class="menu-grid">
                <button class="topic-btn" style="background:#e67e22" onclick="start('animals')">🦁 ANIMALS</button>
                <button class="topic-btn" style="background:#3498db" onclick="start('food')">🍔 FOOD</button>
                <button class="topic-btn" style="background:#2ecc71" onclick="start('school')">📚 SCHOOL</button>
                <button class="topic-btn" style="background:#f1c40f; color:#000" onclick="start('family')">👪 FAMILY</button>
            </div>
            <center><div class="section-title">📝 Grammar</div></center>
            <div class="menu-grid">
                <button class="topic-btn" style="background:var(--purple)" onclick="start('present_perfect')">📌 PRES. PERFECT</button>
                <button class="topic-btn" style="background:#d35400" onclick="start('past_simple')">🕒 PAST SIMPLE</button>
                <button class="topic-btn" style="background:#27ae60" onclick="start('modals')">⚡ MODALS</button>
                <button class="topic-btn" style="background:#c0392b" onclick="start('comparison')">📏 COMPARISON</button>
            </div>
        </div>

        <div id="battle-screen" class="hidden">
            <div class="timer-box"><svg class="timer-svg"><circle class="timer-circle" cx="40" cy="40" r="38"></circle></svg></div>
            <div class="battle-zone">
                <div class="arena">
                    <h2 style="color:var(--red);">LIONS <br> <span id="s1" style="font-size: 2rem;">0</span></h2>
                    <img id="img1" class="q-img" src="">
                    <p id="txt1" style="min-height:40px;"></p>
                    <input type="text" id="in1" class="ans-in" oninput="check(1)" placeholder="Type..." autocomplete="off">
                </div>
                <div class="arena">
                    <h2 style="color:#3498db;">EAGLES <br> <span id="s2" style="font-size: 2rem;">0</span></h2>
                    <img id="img2" class="q-img" src="">
                    <p id="txt2" style="min-height:40px;"></p>
                    <input type="text" id="in2" class="ans-in" oninput="check(2)" placeholder="Type..." autocomplete="off">
                </div>
            </div>
        </div>
    </div>

    <div id="win-screen" class="hidden">
        <h1 id="victory-title" style="font-size: 3rem; color: var(--gold); margin-bottom: 0;">FINAL RESULTS</h1>
        <div class="podium-container">
            <div id="p-box-2" class="podium-bar podium-2">
                <div class="score-tag" id="score-2nd">0</div>
                <div class="team-label" id="label-2nd">EAGLES</div>
                <span style="font-size: 3rem; color: #333;">2</span>
            </div>
            <div id="p-box-1" class="podium-bar podium-1">
                <div class="score-tag" id="score-1st">0</div>
                <div class="team-label" id="label-1st">LIONS</div>
                <span style="font-size: 4rem; color: #333;">1</span>
            </div>
        </div>
        <button style="margin-top: 80px; padding: 15px 40px; cursor: pointer; border-radius: 30px;" onclick="location.reload()">NEW BATTLE</button>
    </div>

    <audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"></audio>
    <audio id="win-sound" src="https://actions.google.com/sounds/v1/human_voices/crowd_cheer.ogg"></audio>

<script>
    const database = {
        animals: [
            {q:"lion", t:"King of the jungle", i:"https://images.pexels.com/photos/247502/pexels-photo-247502.jpeg?w=400"},
            {q:"elephant", t:"Largest land animal", i:"https://images.pexels.com/photos/66898/elephant-cub-tsavo-kenya-66898.jpeg?w=400"},
            {q:"giraffe", t:"Long neck animal", i:"https://images.pexels.com/photos/806441/pexels-photo-806441.jpeg?w=400"},
            {q:"monkey", t:"Loves bananas", i:"https://images.pexels.com/photos/110820/pexels-photo-110820.jpeg?w=400"},
            {q:"zebra", t:"Black and white stripes", i:"https://images.pexels.com/photos/1054655/pexels-photo-1054655.jpeg?w=400"},
            {q:"tiger", t:"Big cat with stripes", i:"https://images.pexels.com/photos/792381/pexels-photo-792381.jpeg?w=400"},
            {q:"snake", t:"No legs, very long", i:"https://images.pexels.com/photos/1108192/pexels-photo-1108192.jpeg?w=400"},
            {q:"rabbit", t:"Long ears, eats carrots", i:"https://images.pexels.com/photos/326012/pexels-photo-326012.jpeg?w=400"},
            {q:"crocodile", t:"Lives in river, big teeth", i:"https://images.pexels.com/photos/1424430/pexels-photo-1424430.jpeg?w=400"},
            {q:"bear", t:"Loves honey and fish", i:"https://images.pexels.com/photos/35435/pexels-photo-35435.jpeg?w=400"},
            {q:"fox", t:"Clever and red animal", i:"https://images.pexels.com/photos/2295744/pexels-photo-2295744.jpeg?w=400"},
            {q:"wolf", t:"Howls at the moon", i:"https://images.pexels.com/photos/158441/wolf-wolf-pack-lupus-canis-lupus-158441.jpeg?w=400"},
            {q:"kangaroo", t:"Lives in Australia", i:"https://images.pexels.com/photos/63632/kangaroo-australia-outback-nature-63632.jpeg?w=400"},
            {q:"penguin", t:"Can swim but not fly", i:"https://images.pexels.com/photos/52509/penguins-antarctica-snow-ice-52509.jpeg?w=300"},
            {q:"panda", t:"Eats bamboo", i:"https://images.pexels.com/photos/3608263/pexels-photo-3608263.jpeg?w=300"}
        ],
        present_perfect: [
            {q:"seen", t:"I have ____ (see) this.", i:"https://images.pexels.com/photos/7991579/pexels-photo-7991579.jpeg?w=300"},
            {q:"broken", t:"He has ____ (break) the cup.", i:"https://images.pexels.com/photos/5202925/pexels-photo-5202925.jpeg?w=300"},
            {q:"written", t:"She has ____ (write) a book.", i:"https://images.pexels.com/photos/210661/pexels-photo-210661.jpeg?w=300"},
            {q:"gone", t:"They have ____ (go) home.", i:"https://images.pexels.com/photos/301920/pexels-photo-301920.jpeg?w=300"},
            {q:"eaten", t:"We have ____ (eat) lunch.", i:"https://images.pexels.com/photos/1639557/pexels-photo-1639557.jpeg?w=300"},
            {q:"drunk", t:"I have ____ (drink) milk.", i:"https://images.pexels.com/photos/248412/pexels-photo-248412.jpeg?w=300"},
            {q:"bought", t:"She has ____ (buy) a car.", i:"https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg?w=300"},
            {q:"slept", t:"They have ____ (sleep) all day.", i:"https://images.pexels.com/photos/3771069/pexels-photo-3771069.jpeg?w=300"},
            {q:"taught", t:"Teacher has ____ (teach) us.", i:"https://images.pexels.com/photos/159844/pexels-photo-159844.jpeg?w=300"},
            {q:"given", t:"I have ____ (give) a gift.", i:"https://images.pexels.com/photos/264787/pexels-photo-264787.jpeg?w=300"},
            {q:"lost", t:"He has ____ (lose) his key.", i:"https://images.pexels.com/photos/101808/pexels-photo-101808.jpeg?w=300"},
            {q:"won", t:"We have ____ (win) the game.", i:"https://images.pexels.com/photos/46798/the-ball-stadion-football-the-pitch-46798.jpeg?w=300"},
            {q:"known", t:"I have ____ (know) her long.", i:"https://images.pexels.com/photos/459466/pexels-photo-459466.jpeg?w=300"},
            {q:"swum", t:"He has ____ (swim) today.", i:"https://images.pexels.com/photos/863988/pexels-photo-863988.jpeg?w=300"},
            {q:"done", t:"You have ____ (do) well.", i:"https://images.pexels.com/photos/159844/pexels-photo-159844.jpeg?w=300"}
        ]
    };

    let p1L=[], p2L=[], p1i=0, p2i=0, sc1=0, sc2=0, currentBonus=1000, timerInt;

    function start(topic) {
        let list = database[topic] || database.animals;
        p1L = [...list].sort(() => Math.random() - 0.5);
        p2L = [...list].sort(() => Math.random() - 0.5);
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('battle-screen').classList.remove('hidden');
        document.getElementById('bg-music').play();
        load(1); load(2);
        resetTimer();
    }

    function resetTimer() {
        clearInterval(timerInt);
        let timeLeft = 10;
        const circle = document.querySelector('.timer-circle');
        timerInt = setInterval(() => {
            timeLeft -= 0.1;
            currentBonus = Math.max(100, Math.ceil(timeLeft * 100)); // Max 1000, Min 100
            circle.style.strokeDashoffset = 251 - (timeLeft / 10) * 251;
            if(timeLeft <= 0) timeLeft = 10;
        }, 100);
    }

    function load(p) {
        let idx = (p==1) ? p1i : p2i;
        let list = (p==1) ? p1L : p2L;
        if(idx >= list.length) {
            document.getElementById('txt'+p).innerText = "FINISHED!";
            document.getElementById('in'+p).style.display = "none";
            if(p1i >= p1L.length && p2i >= p2L.length) finish();
            return;
        }
        document.getElementById('img'+p).src = list[idx].i;
        document.getElementById('txt'+p).innerText = list[idx].t;
        document.getElementById('in'+p).value = "";
        document.getElementById('in'+p).focus();
    }

    function check(p) {
        let val = document.getElementById('in'+p).value.toLowerCase().trim();
        let list = (p==1) ? p1L : p2L;
        let idx = (p==1) ? p1i : p2i;
        if(val === list[idx].q.toLowerCase()) {
            if(p==1) { sc1 += currentBonus; p1i++; document.getElementById('s1').innerText=sc1; }
            else { sc2 += currentBonus; p2i++; document.getElementById('s2').innerText=sc2; }
            load(p); resetTimer();
        }
    }

    function finish() {
        clearInterval(timerInt);
        document.getElementById('bg-music').pause();
        document.getElementById('win-sound').play();
        document.getElementById('battle-screen').classList.add('hidden');
        document.getElementById('win-screen').classList.remove('hidden');

        let winner = sc1 >= sc2 ? {n:"LIONS", s:sc1} : {n:"EAGLES", s:sc2};
        let loser = sc1 < sc2 ? {n:"LIONS", s:sc1} : {n:"EAGLES", s:sc2};

        document.getElementById('score-1st').innerText = winner.s;
        document.getElementById('label-1st').innerText = winner.n;
        document.getElementById('score-2nd').innerText = loser.s;
        document.getElementById('label-2nd').innerText = loser.n;

        setTimeout(() => {
            document.getElementById('p-box-1').style.height = "250px";
            document.getElementById('p-box-2').style.height = "150px";
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }, 500);
    }
</script>
</body>
</html>
