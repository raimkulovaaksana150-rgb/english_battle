<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Universe - Kenesh Education School</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --blue: #1e3799; --red: #e74c3c; --green: #2ecc71; --purple: #8e44ad; }
        body { font-family: 'Arial Black', sans-serif; background: #020617; color: white; margin: 0; overflow: hidden; }
        
        .sidebar { width: 260px; background: linear-gradient(180deg, var(--blue), #0c2461); border-right: 4px solid var(--gold); height: 100vh; float: left; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        .profile-img { width: 120px; height: 120px; border-radius: 50%; border: 4px solid white; object-fit: cover; box-shadow: 0 0 20px var(--gold); }
        .school-info { font-size: 0.8rem; text-align: center; color: var(--gold); margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; width: 100%; }

        .main-stage { margin-left: 260px; height: 100vh; position: relative; overflow-y: auto; }
        .hidden { display: none !important; }

        /* CATEGORY SECTIONS */
        .section-title { text-align: center; color: var(--gold); font-size: 1.8rem; margin: 30px 0 15px 0; text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid var(--gold); display: inline-block; padding: 0 20px; }
        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 0 40px 40px 40px; }
        .topic-btn { padding: 20px; border-radius: 15px; border: none; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 5px #000; font-size: 0.9rem; }
        .topic-btn:hover { transform: translateY(-5px); filter: brightness(1.2); }

        /* BATTLE ELEMENTS */
        .timer-box { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 80px; height: 80px; }
        .timer-svg { transform: rotate(-90deg); width: 80px; height: 80px; }
        .timer-circle { fill: none; stroke: var(--gold); stroke-width: 6; stroke-dasharray: 251; stroke-dashoffset: 0; transition: 0.1s linear; }
        .battle-zone { display: flex; justify-content: space-around; align-items: center; height: 85vh; padding: 20px; }
        .arena { width: 46%; background: rgba(255,255,255,0.08); border-radius: 30px; padding: 20px; border: 2px solid var(--gold); text-align: center; }
        .q-img { width: 100%; height: 200px; border-radius: 20px; object-fit: cover; border: 2px solid #fff; margin-bottom: 10px; }
        .ans-in { width: 85%; padding: 15px; border-radius: 12px; font-size: 1.8rem; text-align: center; border: none; outline: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <img src="96064.jpg" class="profile-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/194/194931.png'">
        <h3 style="margin: 15px 0; text-align: center;">Tukubai kyzy Aksana</h3>
        <p style="color: var(--gold);">English Teacher</p>
        <div class="school-info">Kenesh Education School</div>
    </div>

    <div class="main-stage">
        <div id="home-screen">
            <h1 style="text-align: center; font-size: 3rem; color: var(--gold); padding-top: 30px; margin-bottom: 0;">ENGLISH UNIVERSE</h1>
            
            <center><div class="section-title">📘 Vocabulary</div></center>
            <div class="menu-grid">
                <button class="topic-btn" style="background:#e67e22" onclick="start('animals')">🦁 ANIMALS</button>
                <button class="topic-btn" style="background:#3498db" onclick="start('food')">🍔 FOOD</button>
                <button class="topic-btn" style="background:#2ecc71" onclick="start('school')">📚 SCHOOL</button>
                <button class="topic-btn" style="background:#f1c40f; color:#000" onclick="start('family')">👪 FAMILY</button>
                <button class="topic-btn" style="background:#e74c3c" onclick="start('body')">👃 BODY</button>
                <button class="topic-btn" style="background:#1abc9c" onclick="start('colors')">🎨 COLORS</button>
                <button class="topic-btn" style="background:#9b59b6" onclick="start('clothes')">👕 CLOTHES</button>
                <button class="topic-btn" style="background:#34495e" onclick="start('opposites')">↔️ OPPOSITES</button>
            </div>

            <center><div class="section-title">📝 Grammar</div></center>
            <div class="menu-grid">
                <button class="topic-btn" style="background:var(--purple)" onclick="start('tobe')">✏️ TO BE</button>
                <button class="topic-btn" style="background:#d35400" onclick="start('present_perfect')">📌 PRES. PERFECT</button>
                <button class="topic-btn" style="background:#27ae60" onclick="start('past_simple')">🕒 PAST SIMPLE</button>
                <button class="topic-btn" style="background:#c0392b" onclick="start('modals')">⚡ MODAL VERBS</button>
                <button class="topic-btn" style="background:#2980b9" onclick="start('comparison')">📏 COMPARISON</button>
                <button class="topic-btn" style="background:#16a085" onclick="start('havegot')">💎 HAVE GOT</button>
                <button class="topic-btn" style="background:#8e44ad" onclick="start('plural')">👥 PLURAL FORMS</button>
                <button class="topic-btn" style="background:#7f8c8d" onclick="start('past_cont')">🔄 PAST CONT.</button>
            </div>
        </div>

        <div id="battle-screen" class="hidden">
            <div class="timer-box">
                <svg class="timer-svg"><circle class="timer-circle" cx="40" cy="40" r="36"></circle></svg>
            </div>
            <div class="battle-zone">
                <div class="arena">
                    <h2 style="color:var(--red);">LIONS ⭐ <span id="s1">0</span></h2>
                    <img id="img1" class="q-img" src="">
                    <div id="txt1" style="font-size:1.2rem; margin-bottom:15px;"></div>
                    <input type="text" id="in1" class="ans-in" oninput="check(1)" placeholder="Type..." autocomplete="off">
                </div>
                <div class="arena">
                    <h2 style="color:#3498db;">EAGLES ⭐ <span id="s2">0</span></h2>
                    <img id="img2" class="q-img" src="">
                    <div id="txt2" style="font-size:1.2rem; margin-bottom:15px;"></div>
                    <input type="text" id="in2" class="ans-in" oninput="check(2)" placeholder="Type..." autocomplete="off">
                </div>
            </div>
        </div>
    </div>

    <div id="win-screen" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle, var(--blue), #000); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100;">
        <h1 id="winner-txt" style="font-size:5rem; color:var(--gold);">WINNER!</h1>
        <button style="padding:20px 50px; border-radius:50px; cursor:pointer;" onclick="location.reload()">RESTART</button>
    </div>

<script>
    const database = {
        animals: [{q:"lion", t:"The king of jungle", i:"https://images.pexels.com/photos/247502/pexels-photo-247502.jpeg?w=300"}],
        tobe: [{q:"is", t:"He ___ a teacher.", i:"https://images.pexels.com/photos/40568/medical-appointment-doctor-healthcare-40568.jpeg?w=300"}],
        // ... Калган маалыматтарды ушул жерге кошуп койсоңуз болот
    };

    let p1L=[], p2L=[], p1i=0, p2i=0, sc1=0, sc2=0, bonus=10, timer;

    function start(topic) {
        let list = database[topic] || database.animals;
        p1L = [...list].sort(() => Math.random() - 0.5);
        p2L = [...list].sort(() => Math.random() - 0.5);
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('battle-screen').classList.remove('hidden');
        load(1); load(2);
        resetTimer();
    }

    function resetTimer() {
        clearInterval(timer);
        let left = 10;
        const circ = document.querySelector('.timer-circle');
        timer = setInterval(() => {
            left -= 0.1;
            bonus = Math.max(1, Math.ceil(left));
            circ.style.strokeDashoffset = 251 - (left/10)*251;
            if(left <= 0) left = 10;
        }, 100);
    }

    function load(p) {
        let idx = (p==1) ? p1i : p2i;
        let list = (p==1) ? p1L : p2L;
        if(idx >= list.length) {
            document.getElementById('txt'+p).innerText = "DONE!";
            document.getElementById('in'+p).style.display = "none";
            if(p1i >= p1L.length && p2i >= p2L.length) finish();
            return;
        }
        document.getElementById('img'+p).src = list[idx].i;
        document.getElementById('txt'+p).innerText = list[idx].t;
        document.getElementById('in'+p).value = "";
        document.getElementById('in'+p).focus();
    }

    function check(p) {
        let val = document.getElementById('in'+p).value.toLowerCase().trim();
        let list = (p==1) ? p1L : p2L;
        let idx = (p==1) ? p1i : p2i;
        if(val === list[idx].q.toLowerCase()) {
            if(p==1) { sc1 += bonus; p1i++; document.getElementById('s1').innerText=sc1; }
            else { sc2 += bonus; p2i++; document.getElementById('s2').innerText=sc2; }
            load(p); resetTimer();
        }
    }

    function finish() {
        clearInterval(timer);
        document.getElementById('battle-screen').classList.add('hidden');
        document.getElementById('win-screen').classList.remove('hidden');
        document.getElementById('winner-txt').innerText = sc1 > sc2 ? "LIONS WIN!" : "EAGLES WIN!";
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    }
</script>
</body>
</html>
