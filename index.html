<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aksana - Parallel English Battle</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #050a18; color: white; margin: 0; text-align: center; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* Визитка */
        .profile-card { background: linear-gradient(135deg, #1e3799, #0c2461); padding: 20px; border-radius: 0 0 50px 50px; border-bottom: 4px solid #f1c40f; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .profile-img { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #f1c40f; object-fit: cover; }
        
        /* Меню */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 600px; margin: 20px auto; padding: 10px; }
        .topic-btn { padding: 20px; border-radius: 15px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .topic-btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* ПАРАЛЛЕЛЬ ТАЛАА */
        .battle-container { display: flex; justify-content: space-around; padding: 10px; gap: 10px; height: 80vh; }
        .arena { width: 48%; background: rgba(255,255,255,0.05); border-radius: 20px; border: 2px solid #333; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .arena-1 { border-color: #e74c3c; }
        .arena-2 { border-color: #3498db; }
        
        .team-name { font-size: 1.5rem; margin-bottom: 10px; text-transform: uppercase; }
        .score-val { font-size: 3rem; font-weight: bold; margin: 5px 0; }
        .q-img { width: 100%; max-height: 200px; border-radius: 15px; object-fit: cover; border: 3px solid white; }
        .q-text { background: white; color: black; padding: 10px; border-radius: 10px; margin: 10px 0; min-height: 50px; font-weight: bold; width: 90%; }
        .ans-input { width: 80%; padding: 12px; border-radius: 10px; border: none; font-size: 1.2rem; text-align: center; }

        /* ЖЕҢИШ ЭКРАНЫ */
        #victory-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050a18; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .win-banner { background: #f1c40f; color: black; padding: 20px 50px; border-radius: 50px; font-size: 2.5rem; font-weight: 900; box-shadow: 0 0 50px #f1c40f; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body>

    <audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <div id="home-screen">
        <div class="profile-card">
            <img src="96064.jpg" class="profile-img" alt="Aksana">
            <h2 style="margin:10px 0;">Тукубай кызы Аксана</h2>
            <p>English Battle: Parallel Duel</p>
        </div>
        <div class="menu-grid">
            <button class="topic-btn" style="background:#e74c3c" onclick="startBattle('animals')">🦁 ANIMALS</button>
            <button class="topic-btn" style="background:#3498db" onclick="startBattle('family')">👨‍👩‍👧‍👦 FAMILY</button>
            <button class="topic-btn" style="background:#2ecc71" onclick="startBattle('school')">🏫 SCHOOL</button>
            <button class="topic-btn" style="background:#f1c40f; color: black;" onclick="startBattle('food')">🍎 FOOD</button>
        </div>
    </div>

    <div id="battle-screen" class="hidden">
        <div class="battle-container">
            <div class="arena arena-1">
                <div class="team-name" id="t1-display">Team 1</div>
                <div class="score-val" id="s1">0</div>
                <img id="img1" class="q-img" src="">
                <div id="q1" class="q-text"></div>
                <input type="text" id="in1" class="ans-input" placeholder="Answer..." oninput="checkAnswer(1)">
            </div>

            <div class="arena arena-2">
                <div class="team-name" id="t2-display">Team 2</div>
                <div class="score-val" id="s2">0</div>
                <img id="img2" class="q-img" src="">
                <div id="q2" class="q-text"></div>
                <input type="text" id="in2" class="ans-input" placeholder="Answer..." oninput="checkAnswer(2)">
            </div>
        </div>
    </div>

    <div id="victory-screen" class="hidden">
        <img src="96064.jpg" style="width:150px; border-radius:50%; border:5px solid #f1c40f;">
        <h3 style="color: #f1c40f;">Congratulations from Teacher Aksana!</h3>
        <div class="win-banner" id="winner-name">WINNER</div>
        <h1 style="font-size: 5rem;">🏆</h1>
        <button class="topic-btn" style="background: white; color: black; padding: 15px 40px;" onclick="location.reload()">PLAY AGAIN</button>
    </div>

<script>
    const data = {
        animals: [
            {q:"King of jungle?", a:"lion", i:"https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=400"},
            {q:"Has a long neck?", a:"giraffe", i:"https://images.unsplash.com/photo-1547721064-3625b669fa95?w=400"},
            {q:"Big and grey?", a:"elephant", i:"https://images.unsplash.com/photo-1557050543-4d5f4e07ef46?w=400"},
            {q:"Likes carrots?", a:"rabbit", i:"https://images.unsplash.com/photo-1585110396000-c9ffd4e4b308?w=400"},
            {q:"Man's friend?", a:"dog", i:"https://images.unsplash.com/photo-1517849845537-4d257902454a?w=400"}
        ],
        family: [
            {q:"Father's wife?", a:"mother", i:"https://images.unsplash.com/photo-1510154221590-ff63e90a136f?w=400"},
            {q:"Mother's husband?", a:"father", i:"https://images.unsplash.com/photo-1511895426328-dc8714191300?w=400"},
            {q:"Your sister's brother?", a:"brother", i:"https://images.unsplash.com/photo-1543132220-4bf3de6e10ae?w=400"},
            {q:"Father's father?", a:"grandfather", i:"https://images.unsplash.com/photo-1542610118-2e0f46c31043?w=400"}
        ]
        // Каалаганча тема кошсо болот...
    };

    let p1List = [], p2List = [], p1Idx = 0, p2Idx = 0, s1 = 0, s2 = 0;

    function startBattle(topic) {
        let n1 = prompt("1-Team name:", "LIONS");
        let n2 = prompt("2-Team name:", "EAGLES");
        document.getElementById('t1-display').innerText = n1;
        document.getElementById('t2-display').innerText = n2;

        p1List = [...data[topic]].sort(() => Math.random() - 0.5); // Аралаштыруу
        p2List = [...data[topic]].sort(() => Math.random() - 0.5); // Аралаштыруу
        
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('battle-screen').classList.remove('hidden');
        document.getElementById('bg-music').play();
        
        render(1); render(2);
    }

    function render(p) {
        if (p === 1) {
            if (p1Idx >= p1List.length) return checkEnd();
            document.getElementById('q1').innerText = p1List[p1Idx].q;
            document.getElementById('img1').src = p1List[p1Idx].i;
            document.getElementById('in1').value = "";
        } else {
            if (p2Idx >= p2List.length) return checkEnd();
            document.getElementById('q2').innerText = p2List[p2Idx].q;
            document.getElementById('img2').src = p2List[p2Idx].i;
            document.getElementById('in2').value = "";
        }
    }

    function checkAnswer(p) {
        let input = document.getElementById('in' + p).value.trim().toLowerCase();
        let correct = (p === 1) ? p1List[p1Idx].a : p2List[p2Idx].a;

        if (input === correct) {
            if (p === 1) { s1++; p1Idx++; document.getElementById('s1').innerText = s1; render(1); }
            else { s2++; p2Idx++; document.getElementById('s2').innerText = s2; render(2); }
        }
    }

    function checkEnd() {
        if (p1Idx >= p1List.length && p2Idx >= p2List.length) {
            document.getElementById('battle-screen').classList.add('hidden');
            document.getElementById('victory-screen').classList.remove('hidden');
            let winner = s1 > s2 ? document.getElementById('t1-display').innerText : (s2 > s1 ? document.getElementById('t2-display').innerText : "TIE / ТЕҢ ЧЫГЫШ");
            document.getElementById('winner-name').innerText = winner;
        }
    }
</script>
</body>
</html>
