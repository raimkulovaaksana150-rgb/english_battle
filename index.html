<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>English Speed Battle PRO - Aksana Tukubai kyzy</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --blue: #1e3799; --dark: #010a24; --accent: #00d4ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #051937, #004d7a); border-right: 4px solid var(--gold); height: 100vh; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; align-items: center; padding: 25px 15px; box-sizing: border-box; z-index: 10; }
        .logo-circle { width: 110px; height: 110px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; border: 4px solid var(--gold); overflow: hidden; }
        .logo-circle img { width: 100%; height: 100%; object-fit: cover; }
        .main-stage { margin-left: 280px; height: 100vh; background: radial-gradient(circle at center, #0a2e5c 0%, #010a24 100%); display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        .box { background: rgba(255,255,255,0.07); padding: 30px; border-radius: 25px; border: 1px solid rgba(241, 196, 15, 0.3); text-align: center; width: 850px; backdrop-filter: blur(10px); }
        .arena { flex: 1; background: rgba(0,0,0,0.4); border-radius: 20px; border: 2px solid var(--gold); padding: 20px; text-align: center; margin: 0 10px; display: flex; flex-direction: column; justify-content: space-between; position: relative; min-height: 500px; }
        .q-img { width: 100%; height: 220px; border-radius: 15px; object-fit: cover; border: 2px solid white; }
        .ans-in { width: 90%; padding: 15px; border-radius: 10px; font-size: 1.6rem; text-align: center; font-weight: bold; border: 4px solid transparent; outline: none; transition: 0.3s; color: #010a24; }
        .ans-in.correct { background-color: #2ecc71 !important; color: white !important; }
        .ans-in.wrong { background-color: #e74c3c !important; color: white !important; }
        .score-val { font-size: 3rem; color: var(--gold); font-weight: bold; margin-bottom: 5px; }
        .btn { padding: 12px 20px; border-radius: 10px; border: none; background: var(--gold); color: black; font-weight: bold; cursor: pointer; font-size: 1rem; margin: 5px; }
        .podium-step { width: 150px; border-radius: 15px 15px 0 0; display: flex; flex-direction: column; align-items: center; padding: 10px; color: #010a24; font-weight: bold; }
        .first-place { height: 200px; background: #ffd700; box-shadow: 0 0 30px #f1c40f; }
        .second-place { height: 140px; background: #bdc3c7; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-circle"><img src="96064.jpg" onerror="this.src='https://img.icons8.com/bubbles/200/teacher.png'"></div>
    <h1 style="color:var(--gold); font-size:1.1rem; text-align:center;">SOURCE OF KNOWLEDGE</h1>
    <div style="text-align:center; font-size:0.9rem; margin-top:10px;">Aksana Tukubai kyzy</div>
</div>

<div class="main-stage">
    <div id="setup-screen" class="box">
        <h2 style="color:var(--gold);">TEAM NAMES</h2>
        <input type="text" id="name1" style="padding:10px; border-radius:5px;" value="LIONS">
        <input type="text" id="name2" style="padding:10px; border-radius:5px;" value="EAGLES">
        <br><br><button class="btn" onclick="showMenu()">START</button>
    </div>

    <div id="menu-screen" class="box hidden">
        <h3 style="color:var(--gold);">CHOOSE TOPIC</h3>
        <p style="color:#00d4ff;">Vocabulary</p>
        <button class="btn" onclick="startBattle('animals')">Animals</button>
        <button class="btn" onclick="startBattle('fruits')">Fruits</button>
        <button class="btn" onclick="startBattle('school')">School Items</button>
        <p style="color:#00d4ff;">Grammar</p>
        <button class="btn" onclick="startBattle('be')">To Be</button>
        <button class="btn" onclick="startBattle('past')">Past Simple</button>
    </div>

    <div id="battle-screen" class="hidden" style="display:flex; width:95%;">
        <div class="arena">
            <h3 id="dn1" style="color:#ff4757; margin:0;"></h3>
            <div class="score-val" id="s1">0</div>
            <img id="img1" class="q-img" src="">
            <div id="qText1" style="margin:10px 0; font-weight:bold;"></div>
            <input type="text" id="in1" class="ans-in" readonly onfocus="this.removeAttribute('readonly')" oninput="checkAnswer(1)" autocomplete="off">
        </div>
        <div class="arena">
            <h3 id="dn2" style="color:var(--accent); margin:0;"></h3>
            <div class="score-val" id="s2">0</div>
            <img id="img2" class="q-img" src="">
            <div id="qText2" style="margin:10px 0; font-weight:bold;"></div>
            <input type="text" id="in2" class="ans-in" readonly onfocus="this.removeAttribute('readonly')" oninput="checkAnswer(2)" autocomplete="off">
        </div>
    </div>
</div>

<div id="win-screen" class="box hidden" style="position:fixed; inset:0; width:100%; height:100%; z-index:1000; background:rgba(1,10,36,0.98); display:flex; flex-direction:column; justify-content:center; align-items:center;">
    <h1 id="winner-banner" style="color:var(--gold); font-size:3rem;"></h1>
    <div style="display:flex; align-items:flex-end; gap:20px; margin-top:30px;">
        <div class="podium-step second-place">
            <div id="p-name2" style="color:white; margin-bottom:5px;"></div>
            <div id="p-score2" style="font-size:1.5rem;"></div>
            <div style="font-size:2rem;">🥈</div>
        </div>
        <div class="podium-step first-place">
            <div id="p-name1" style="color:white; margin-bottom:5px;"></div>
            <div id="p-score1" style="font-size:1.8rem;"></div>
            <div style="font-size:3rem;">👑</div>
        </div>
    </div>
    <br><button class="btn" onclick="location.reload()">PLAY AGAIN</button>
</div>

<script>
    const quizData = {
        animals: [
            {q:"elephant", s:"Which animal has a big nose?", i:"https://images.unsplash.com/photo-1557050543-4d5f4e07ef46?w=400"},
            {q:"lion", s:"The king of the jungle.", i:"https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=400"},
            {q:"giraffe", s:"It has a long neck.", i:"https://images.unsplash.com/photo-1547721064-36202181c922?w=400"},
            {q:"monkey", s:"It loves climbing.", i:"https://images.unsplash.com/photo-1540573133985-87b6da6d54a9?w=400"},
            {q:"tiger", s:"A big cat with stripes.", i:"https://images.unsplash.com/photo-1508817628294-5a453fa0b8fb?w=400"}
        ],
        fruits: [
            {q:"apple", s:"Red and round.", i:"https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?w=400"},
            {q:"banana", s:"Yellow and long.", i:"https://images.unsplash.com/photo-1571771894821-ad9b588640ba?w=400"},
            {q:"lemon", s:"Sour and yellow.", i:"https://images.unsplash.com/photo-1582979512210-99b6a53386f9?w=400"},
            {q:"orange", s:"Juicy and orange.", i:"https://images.unsplash.com/photo-1582979512210-99b6a53386f9?w=400"}
        ],
        school: [
            {q:"pencil", s:"Used for drawing.", i:"https://images.unsplash.com/photo-1510172951991-856a654063f9?w=400"},
            {q:"book", s:"You read this.", i:"https://images.unsplash.com/photo-1544947950-fa07a98d237f?w=400"},
            {q:"bag", s:"To carry things.", i:"https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=400"},
            {q:"ruler", s:"To measure things.", i:"https://images.unsplash.com/photo-1586075010633-24701bd6e8b4?w=400"}
        ],
        be: [
            {q:"am", s:"I ___ happy.", i:"https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=400"},
            {q:"is", s:"He ___ a doctor.", i:"https://images.unsplash.com/photo-1529900748604-07564a03f7a6?w=400"},
            {q:"are", s:"They ___ students.", i:"https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=400"}
        ],
        past: [
            {q:"was", s:"I ___ at home yesterday.", i:"https://images.unsplash.com/photo-1518780664697-55e3ad937233?w=400"},
            {q:"were", s:"We ___ busy.", i:"https://images.unsplash.com/photo-1519331379826-f10be5486c6f?w=400"},
            {q:"went", s:"She ___ to school.", i:"https://images.unsplash.com/photo-1509062522246-3755977927d7?w=400"}
        ]
    };

    let p1List=[], p2List=[], p1Idx=0, p2Idx=0, score1=0, score2=0, isActive=false;

    function showMenu() {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('menu-screen').classList.remove('hidden');
    }

    function startBattle(topic) {
        // Ар бир оюнчуга суроолорду өз-өзүнчө аралаштырып берүү
        p1List = [...quizData[topic]].sort(() => Math.random() - 0.5);
        p2List = [...quizData[topic]].sort(() => Math.random() - 0.5);
        document.getElementById('dn1').innerText = document.getElementById('name1').value;
        document.getElementById('dn2').innerText = document.getElementById('name2').value;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('battle-screen').classList.remove('hidden');
        isActive = true; p1Idx=0; p2Idx=0; score1=0; score2=0;
        updatePlayer(1); updatePlayer(2);
    }

    function updatePlayer(p) {
        let list = (p==1) ? p1List : p2List;
        let idx = (p==1) ? p1Idx : p2Idx;
        if(idx >= list.length) { checkFinish(); return; }
        document.getElementById('img'+p).src = list[idx].i;
        document.getElementById('qText'+p).innerText = list[idx].s;
        let input = document.getElementById('in'+p);
        input.value = ""; input.className = "ans-in";
        input.setAttribute('readonly', true);
    }

    function checkAnswer(p) {
        if(!isActive) return;
        let input = document.getElementById('in'+p);
        let val = input.value.toLowerCase().trim();
        let list = (p==1) ? p1List : p2List;
        let idx = (p==1) ? p1Idx : p2Idx;
        let correct = list[idx].q;

        if(val === correct) {
            input.classList.add('correct');
            if(p==1) { score1 += 20; document.getElementById('s1').innerText = score1; p1Idx++; }
            else { score2 += 20; document.getElementById('s2').innerText = score2; p2Idx++; }
            setTimeout(() => updatePlayer(p), 500);
        } else if(val.length >= correct.length) { // Ката жазса кийинкиге өтүү
            input.classList.add('wrong');
            setTimeout(() => { 
                if(p==1) p1Idx++; else p2Idx++; 
                updatePlayer(p); 
            }, 600);
        }
    }

    function checkFinish() {
        if(p1Idx >= p1List.length && p2Idx >= p2List.length) {
            isActive = false;
            document.getElementById('battle-screen').classList.add('hidden');
            document.getElementById('win-screen').classList.remove('hidden');
            let n1 = document.getElementById('name1').value, n2 = document.getElementById('name2').value;
            
            if(score1 >= score2) {
                fillPodium(n1, score1, n2, score2);
                document.getElementById('winner-banner').innerText = n1 + " WINS!";
            } else {
                fillPodium(n2, score2, n1, score1);
                document.getElementById('winner-banner').innerText = n2 + " WINS!";
            }
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    }

    function fillPodium(wN, wS, lN, lS) {
        document.getElementById('p-name1').innerText = wN;
        document.getElementById('p-score1').innerText = wS;
        document.getElementById('p-name2').innerText = lN;
        document.getElementById('p-score2').innerText = lS;
    }
</script>
</body>
</html>
