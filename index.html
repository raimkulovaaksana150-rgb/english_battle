<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>English Speed Battle - Aksana Tukubai kyzy Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --dark: #010a24; --accent: #00d4ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; }
        
        .sidebar { width: 280px; background: #051937; border-right: 4px solid var(--gold); height: 100vh; position: fixed; left: 0; display: flex; flex-direction: column; align-items: center; padding: 25px 15px; z-index: 10; text-align: center; }
        .profile-img { width: 140px; height: 140px; background: #fff; border-radius: 50%; border: 4px solid var(--gold); overflow: hidden; margin-bottom: 20px; }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .main-stage { margin-left: 280px; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        .box { background: rgba(255,255,255,0.08); padding: 30px; border-radius: 20px; text-align: center; width: 850px; border: 1px solid var(--gold); backdrop-filter: blur(10px); }
        
        .arena-container { display: flex; width: 98%; gap: 15px; height: 95vh; padding: 10px; box-sizing: border-box; }
        .arena { flex: 1; background: rgba(0,0,0,0.6); border: 3px solid var(--gold); border-radius: 25px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; position: relative; }
        .q-img { width: 100%; height: 260px; object-fit: cover; border-radius: 15px; border: 2px solid white; }
        .score { font-size: 3.5rem; color: var(--gold); font-weight: bold; margin: 0; }
        .ans-in { width: 90%; padding: 15px; font-size: 1.8rem; text-align: center; border-radius: 12px; border: 4px solid #fff; outline: none; font-weight: bold; color: #010a24; }
        .ans-in.correct { background: #2ecc71 !important; color: white; }
        
        .btn { padding: 12px 20px; background: var(--gold); border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; color: #010a24; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .bonus-badge { position: absolute; top: 10px; right: 10px; background: #ff4757; color: white; padding: 5px 10px; border-radius: 5px; font-weight: bold; display: none; font-size: 0.8rem; animation: pulse 1s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.1);} 100% {transform: scale(1);} }
        .ans-in.wrong {
    background-color: #ff4757 !important;
    border: 3px solid #ff0000 !important;
    color: white !important;
}

.ans-in.correct {
    background-color: #2ecc71 !important;
    border: 3px solid #27ae60 !important;
    color: white !important;
}
    </style>
</head>
<body>

<audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
<audio id="correct-sound" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>

<div class="sidebar">
    <div class="profile-img">
        <img src="96064.jpg" alt="Aksana Tukubai kyzy" onerror="this.src='https://img.icons8.com/bubbles/200/teacher.png'">
    </div>
    <h3 style="color:var(--gold); font-size: 0.8rem; text-transform: uppercase;">Source of Knowledge</h3>
    <p style="font-weight: bold; color: #fff; font-size: 1.2rem; margin: 5px 0;">Aksana Tukubai kyzy</p>
    <p style="color: var(--accent); font-weight: bold; font-size: 0.9rem;">Kenesh General Education School</p>
    <hr style="width: 85%; border: 0.5px solid var(--gold); opacity: 0.3; margin: 20px 0;">
    <p style="font-size: 0.8rem; color: #bdc3c7;">Bonus for Speed: +50 pts</p>
</div>

<div class="main-stage">
    <div id="setup-screen" class="box">
        <h1 style="color:var(--gold); font-size: 2.2rem;">ENTER TEAM NAMES</h1>
        <div style="margin: 30px 0; display: flex; justify-content: center; gap: 20px; align-items: center;">
            <input type="text" id="t1" value="TEAM A" style="padding:15px; font-size:1.5rem; border-radius:10px; width: 35%;">
            <span style="font-size: 2rem;">VS</span>
            <input type="text" id="t2" value="TEAM B" style="padding:15px; font-size:1.5rem; border-radius:10px; width: 35%;">
        </div>
        <button class="btn" style="font-size: 1.5rem;" onclick="openMenu()">CONTINUE ➔</button>
    </div>

    <div id="menu-screen" class="box hidden">
        <h2 style="color:var(--gold);">CHOOSE TOPIC</h2>
        <div class="menu-grid">
            <button class="btn" onclick="startBattle('animals')">🦁 Animals</button>
            <button class="btn" onclick="startBattle('fruits')">🍎 Fruits</button>
            <button class="btn" onclick="startBattle('school')">🎒 School</button>
            <button class="btn" onclick="startBattle('verbs')">🏃 Verbs</button>
            <button class="btn" style="background:#e67e22" onclick="startBattle('colors')">🎨 Colors</button>
            <button class="btn" style="background:#e67e22" onclick="startBattle('family')">👨‍👩‍👧 Family</button>
            <button class="btn" style="background:#e67e22" onclick="startBattle('body')">🦴 Body Parts</button>
            <button class="btn" style="background:#e67e22" onclick="startBattle('clothes')">👕 Clothes</button>
        </div>
    </div>

    <div id="battle-screen" class="arena-container hidden">
        <div class="arena">
            <div class="bonus-badge" id="bonus-1">⚡ FIRST FINISH! +50</div>
            <h2 id="name-1" style="color:#ff4757; margin:0;"></h2>
            <div class="score" id="score-1">0</div>
            <img id="img-1" class="q-img">
            <p id="text-1" style="font-size:1.4rem; font-weight:bold; height:60px;"></p>
            <input type="text" id="input-1" class="ans-in" autocomplete="off" placeholder="..." oninput="check(1)">
        </div>
        <div class="arena">
            <div class="bonus-badge" id="bonus-2">⚡ FIRST FINISH! +50</div>
            <h2 id="name-2" style="color:var(--accent); margin:0;"></h2>
            <div class="score" id="score-2">0</div>
            <img id="img-2" class="q-img">
            <p id="text-2" style="font-size:1.4rem; font-weight:bold; height:60px;"></p>
            <input type="text" id="input-2" class="ans-in" autocomplete="off" placeholder="..." oninput="check(2)">
        </div>
    </div>

    <div id="win-screen" class="box hidden">
        <h1 id="winner-text" style="color:var(--gold); font-size:3.5rem;"></h1>
        <div style="display: flex; align-items: flex-end; justify-content: center; gap: 20px; margin: 30px 0;">
            <div style="width:140px; height:120px; background:#bdc3c7; border-radius:10px; color:#010a24; padding:10px;">
                <div id="silver-name"></div><div id="silver-score" style="font-size:1.8rem;"></div><div>🥈</div>
            </div>
            <div style="width:160px; height:180px; background:#ffd700; border-radius:10px; color:#010a24; padding:10px; box-shadow: 0 0 30px #f1c40f;">
                <div id="gold-name"></div><div id="gold-score" style="font-size:2.2rem;"></div><div>👑</div>
            </div>
        </div>
        <button class="btn" onclick="location.reload()">NEW GAME 🔄</button>
    </div>
</div>

    let p1L=[], p2L=[], p1I=0, p2I=0, s1=0, s2=0, playing=false, bonusGiven=false;

    function openMenu() {
        document.getElementById('bg-music').play().catch(()=>{});
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('menu-screen').classList.remove('hidden');
    }

    function shuffle(a) { return a.sort(() => Math.random() - 0.5); }

    function startBattle(t) {
        p1L = shuffle([...quizData[t]]);
        p2L = shuffle([...quizData[t]]);
        document.getElementById('name-1').innerText = document.getElementById('t1').value;
        document.getElementById('name-2').innerText = document.getElementById('t2').value;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('battle-screen').classList.remove('hidden');
        playing = true; p1I = 0; p2I = 0; s1 = 0; s2 = 0; bonusGiven = false;
        load(1); load(2);
    }

    function load(p) {
        let l = (p==1)?p1L:p2L; let i = (p==1)?p1I:p2I;
        if(i >= l.length) { 
            if(!bonusGiven) {
                bonusGiven = true;
                if(p==1) { s1 += 50; document.getElementById('bonus-1').style.display = 'block'; }
                else { s2 += 50; document.getElementById('bonus-2').style.display = 'block'; }
                document.getElementById('score-'+p).innerText = (p==1?s1:s2);
            }
            finish(); return; 
        }
        document.getElementById('img-'+p).src = l[i].i;
        document.getElementById('text-'+p).innerText = l[i].s;
        let inp = document.getElementById('input-'+p);
        inp.value = ""; inp.className = "ans-in"; inp.disabled = false;
        if(p==1) setTimeout(()=>inp.focus(), 10);
    }

  function check(p) {
    if(!playing) return;
    let inp = document.getElementById('input-'+p);
    let val = inp.value.toLowerCase().trim();
    let list = (p==1) ? p1L : p2L; 
    let idx = (p==1) ? p1I : p2I;
    let correctWord = list[idx].q;

    // 1. ТУУРА ЖООП: Сөз толук жана туура жазылса
    if(val === correctWord) {
        inp.classList.add('correct');
        inp.disabled = true;
        if(p==1) { s1+=20; p1I++; document.getElementById('score-1').innerText = s1; }
        else { s2+=20; p2I++; document.getElementById('score-2').innerText = s2; }
        setTimeout(() => load(p), 400);
    } 
    // 2. КАТА ЖООП: Жазылган тамга туура жооптун башталышына дал келбесе
    else if (val !== correctWord.substring(0, val.length)) {
        inp.classList.add('wrong'); // Рамка дароо кызарат
        inp.disabled = true;
        if(p==1) p1I++; else p2I++;
        setTimeout(() => load(p), 600); // 0.6 сек кийин жаңы суроо
    }
}

    function finish() {
        if(p1I >= p1L.length && p2I >= p2L.length) {
            playing = false;
            document.getElementById('battle-screen').classList.add('hidden');
            document.getElementById('win-screen').classList.remove('hidden');
            let n1 = document.getElementById('t1').value, n2 = document.getElementById('t2').value;
            if(s1 >= s2) { res(n1,s1,n2,s2); } else { res(n2,s2,n1,s1); }
            confetti({ particleCount: 200, spread: 80 });
        }
    }

    function res(wN, wS, lN, lS) {
        document.getElementById('winner-text').innerText = wN + " WINS! 🏆";
        document.getElementById('gold-name').innerText = wN; document.getElementById('gold-score').innerText = wS;
        document.getElementById('silver-name').innerText = lN; document.getElementById('silver-score').innerText = lS;
    }
</script>
