<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>English Speed Battle - Aksana Tukubai kyzy</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --dark: #010a24; --accent: #00d4ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; }
        
        /* Sidebar Profile */
        .sidebar { width: 280px; background: #051937; border-right: 4px solid var(--gold); height: 100vh; position: fixed; left: 0; display: flex; flex-direction: column; align-items: center; padding: 25px 15px; z-index: 10; text-align: center; }
        .profile-img { width: 140px; height: 140px; background: #fff; border-radius: 50%; border: 4px solid var(--gold); overflow: hidden; margin-bottom: 20px; }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .main-stage { margin-left: 280px; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        .box { background: rgba(255,255,255,0.08); padding: 30px; border-radius: 20px; text-align: center; width: 850px; border: 1px solid var(--gold); backdrop-filter: blur(10px); }
        
        .arena-container { display: flex; width: 98%; gap: 15px; height: 95vh; padding: 10px; box-sizing: border-box; }
        .arena { flex: 1; background: rgba(0,0,0,0.6); border: 3px solid var(--gold); border-radius: 25px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
        .q-img { width: 100%; height: 260px; object-fit: cover; border-radius: 15px; border: 2px solid white; }
        .score { font-size: 3.8rem; color: var(--gold); font-weight: bold; margin: 0; }
        .ans-in { width: 90%; padding: 15px; font-size: 1.8rem; text-align: center; border-radius: 12px; border: 4px solid #fff; outline: none; font-weight: bold; color: #010a24; }
        .ans-in.correct { background: #2ecc71 !important; color: white; }
        .ans-in.wrong { background: #e74c3c !important; color: white; }
        
        .btn { padding: 15px 30px; background: var(--gold); border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.1rem; color: #010a24; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
<audio id="correct-sound" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="wrong-sound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

<div class="sidebar">
    <div class="profile-img">
        <img src="96064.jpg" alt="Aksana Tukubai kyzy" onerror="this.src='https://img.icons8.com/bubbles/200/teacher.png'">
    </div>
    <h3 style="color:var(--gold); font-size: 1rem; margin-bottom: 5px; text-transform: uppercase;">Source of Knowledge</h3>
    <p style="font-weight: bold; color: #fff; font-size: 1.3rem; margin: 5px 0;">Aksana Tukubai kyzy</p>
    <p style="color: var(--accent); font-weight: bold; font-size: 1rem; margin-top: 5px;">Kenesh General <br> Education School</p>
    <hr style="width: 85%; border: 0.5px solid var(--gold); opacity: 0.3; margin: 25px 0;">
</div>

<div class="main-stage">
    <div id="setup-screen" class="box">
        <h1 style="color:var(--gold); font-size: 2.5rem;">BATTLE REGISTRATION</h1>
        <div style="margin: 30px 0; display: flex; justify-content: center; gap: 20px; align-items: center;">
            <input type="text" id="t1" value="LIONS" style="padding:15px; font-size:1.5rem; border-radius:10px; width: 35%;">
            <span style="font-size: 2rem; font-weight: bold;">VS</span>
            <input type="text" id="t2" value="EAGLES" style="padding:15px; font-size:1.5rem; border-radius:10px; width: 35%;">
        </div>
        <button class="btn" onclick="openMenu()">CONTINUE ➔</button>
    </div>

    <div id="menu-screen" class="box hidden">
        <h2 style="color:var(--gold);">CHOOSE TOPIC</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <button class="btn" onclick="startBattle('animals')">🦁 Animals</button>
            <button class="btn" onclick="startBattle('fruits')">🍎 Fruits</button>
            <button class="btn" onclick="startBattle('school')">🎒 School</button>
            <button class="btn" onclick="startBattle('verbs')">🏃 Verbs</button>
        </div>
    </div>

    <div id="battle-screen" class="arena-container hidden">
        <div class="arena">
            <h2 id="name-1" style="color:#ff4757; margin:0;"></h2>
            <div class="score" id="score-1">0</div>
            <img id="img-1" class="q-img">
            <p id="text-1" style="font-size:1.4rem; font-weight:bold; height:60px;"></p>
            <input type="text" id="input-1" class="ans-in" autocomplete="off" oninput="check(1)">
        </div>
        <div class="arena">
            <h2 id="name-2" style="color:var(--accent); margin:0;"></h2>
            <div class="score" id="score-2">0</div>
            <img id="img-2" class="q-img">
            <p id="text-2" style="font-size:1.4rem; font-weight:bold; height:60px;"></p>
            <input type="text" id="input-2" class="ans-in" autocomplete="off" oninput="check(2)">
        </div>
    </div>

    <div id="win-screen" class="box hidden" style="position:fixed; inset:0; width:100%; height:100%; background:rgba(1,10,36,0.98); z-index:100; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <h1 id="winner-text" style="color:var(--gold); font-size:4rem;"></h1>
        <div style="display: flex; align-items: flex-end; gap: 20px; margin-top: 30px;">
            <div style="width:160px; height:150px; background:#bdc3c7; border-radius:15px 15px 0 0; color:#010a24; padding:15px; font-weight:bold;">
                <div id="silver-name"></div><div id="silver-score" style="font-size:2rem;"></div><div>🥈</div>
            </div>
            <div style="width:180px; height:220px; background:#ffd700; border-radius:15px 15px 0 0; color:#010a24; padding:15px; font-weight:bold; box-shadow: 0 0 30px #f1c40f;">
                <div id="gold-name"></div><div id="gold-score" style="font-size:2.5rem;"></div><div>👑</div>
            </div>
        </div>
        <br><button class="btn" onclick="location.reload()" style="margin-top:40px;">NEW BATTLE 🔄</button>
    </div>
</div>

<script>
    const quizData = {
        animals: [
            {q:"elephant", s:"Big animal with a trunk.", i:"https://images.unsplash.com/photo-1557050543-4d5f4e07ef46?w=400"},
            {q:"lion", s:"The king of the jungle.", i:"https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=400"},
            {q:"giraffe", s:"It has a very long neck.", i:"https://images.unsplash.com/photo-1547721064-36202181c922?w=400"},
            {q:"monkey", s:"Loves climbing and bananas.", i:"https://images.unsplash.com/photo-1540573133985-87b6da6d54a9?w=400"},
            {q:"zebra", s:"Black and white stripes.", i:"https://images.unsplash.com/photo-1501705388883-4ed8a543392c?w=400"},
            {q:"tiger", s:"Large orange cat with stripes.", i:"https://images.unsplash.com/photo-1508817628294-5a453fa0b8fb?w=400"}
        ],
        fruits: [
            {q:"apple", s:"Red or green round fruit.", i:"https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?w=400"},
            {q:"banana", s:"Long yellow fruit.", i:"https://images.unsplash.com/photo-1571771894821-ad9b588640ba?w=400"},
            {q:"lemon", s:"Very sour and yellow.", i:"https://images.unsplash.com/photo-1582979512210-99b6a53386f9?w=400"}
        ],
        school: [
            {q:"pencil", s:"Used to write or draw.", i:"https://images.unsplash.com/photo-1510172951991-856a654063f9?w=400"},
            {q:"book", s:"You read this for study.", i:"https://images.unsplash.com/photo-1544947950-fa07a98d237f?w=400"}
        ],
        verbs: [
            {q:"run", s:"To move very fast.", i:"https://images.unsplash.com/photo-1476480862126-209bfaa8edc8?w=400"},
            {q:"swim", s:"To move in water.", i:"https://images.unsplash.com/photo-1519315585047-ad8a19a40869?w=400"}
        ]
    };

    let p1L=[], p2L=[], p1I=0, p2I=0, s1=0, s2=0, playing=false;

    function openMenu() {
        document.getElementById('bg-music').play().catch(()=>{});
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('menu-screen').classList.remove('hidden');
    }

    function shuffle(a) { return a.sort(() => Math.random() - 0.5); }

    function startBattle(t) {
        p1L = shuffle([...quizData[t]]);
        p2L = shuffle([...quizData[t]]);
        document.getElementById('name-1').innerText = document.getElementById('t1').value;
        document.getElementById('name-2').innerText = document.getElementById('t2').value;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('battle-screen').classList.remove('hidden');
        playing = true; p1I = 0; p2I = 0; s1 = 0; s2 = 0;
        load(1); load(2);
    }

    function load(p) {
        let l = (p==1)?p1L:p2L; let i = (p==1)?p1I:p2I;
        if(i >= l.length) { finish(); return; }
        document.getElementById('img-'+p).src = l[i].i;
        document.getElementById('text-'+p).innerText = l[i].s;
        let inp = document.getElementById('input-'+p);
        inp.value = ""; inp.className = "ans-in"; inp.disabled = false;
        if(p==1) setTimeout(()=>inp.focus(), 10);
    }

    function check(p) {
        if(!playing) return;
        let inp = document.getElementById('input-'+p);
        let val = inp.value.toLowerCase().trim();
        let l = (p==1)?p1L:p2L; let i = (p==1)?p1I:p2I;
        if(val === l[i].q) {
            document.getElementById('correct-sound').play();
            inp.classList.add('correct'); inp.disabled = true;
            if(p==1) { s1+=20; p1I++; document.getElementById('score-1').innerText = s1; }
            else { s2+=20; p2I++; document.getElementById('score-2').innerText = s2; }
            setTimeout(()=>load(p), 400);
        } else if(val.length >= l[i].q.length) {
            document.getElementById('wrong-sound').play();
            inp.classList.add('wrong'); inp.disabled = true;
            setTimeout(()=>{ if(p==1) p1I++; else p2I++; load(p); }, 600);
        }
    }

    function finish() {
        if(p1I >= p1L.length && p2I >= p2L.length) {
            playing = false;
            document.getElementById('battle-screen').classList.add('hidden');
            document.getElementById('win-screen').classList.remove('hidden');
            let n1 = document.getElementById('t1').value, n2 = document.getElementById('t2').value;
            if(s1 >= s2) { res(n1,s1,n2,s2); } else { res(n2,s2,n1,s1); }
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    }

    function res(wN, wS, lN, lS) {
        document.getElementById('winner-text').innerText = wN + " WINS! 👑";
        document.getElementById('gold-name').innerText = wN; document.getElementById('gold-score').innerText = wS;
        document.getElementById('silver-name').innerText = lN; document.getElementById('silver-score').innerText = lS;
    }
</script>
</body>
</html>
