<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Universe - Kenesh School</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --blue: #1e3799; --red: #e74c3c; --green: #2ecc71; --dark: #020617; }
        body { font-family: 'Arial Black', sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; }
        .sidebar { width: 250px; background: #0c2461; border-right: 3px solid var(--gold); height: 100vh; float: left; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid white; object-fit: cover; }
        .main-stage { margin-left: 250px; height: 100vh; position: relative; overflow-y: auto; background: radial-gradient(circle, #1e3799, #020617); }
        .hidden { display: none !important; }
        .section-title { color: var(--gold); font-size: 1.5rem; text-align: center; margin: 20px 0; text-transform: uppercase; border-bottom: 2px solid var(--gold); display: inline-block; padding: 0 15px; }
        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 0 30px 30px 30px; }
        .topic-btn { padding: 15px; border-radius: 12px; border: none; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px #000; font-size: 0.8rem; }
        .topic-btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        .timer-box { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 70px; height: 70px; z-index: 10; }
        .timer-svg { transform: rotate(-90deg); width: 70px; height: 70px; }
        .timer-circle { fill: none; stroke: var(--gold); stroke-width: 7; stroke-dasharray: 220; stroke-dashoffset: 0; transition: 0.1s linear; }
        .battle-zone { display: flex; justify-content: space-around; align-items: center; height: 85vh; padding: 0 20px; }
        .arena { width: 46%; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; border: 2px solid var(--gold); text-align: center; }
        .q-img { width: 100%; height: 220px; border-radius: 15px; object-fit: cover; border: 2px solid white; margin-bottom: 10px; }
        .ans-in { width: 85%; padding: 12px; border-radius: 10px; font-size: 1.8rem; text-align: center; border: none; font-weight: bold; outline: none; }
        #win-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .podium-bar { width: 150px; border-radius: 15px 15px 0 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 20px; transition: 1s ease-out; background: var(--gold); color: black; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <img src="96064.jpg" class="profile-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/194/194931.png'">
        <h3 style="text-align: center; font-size: 0.9rem; margin: 15px 0;">Tukubai kyzy Aksana</h3>
        <div style="margin-top: auto; color: var(--gold); font-size: 0.7rem;">Kenesh Education School</div>
    </div>

    <div class="main-stage">
        <div id="home-screen">
            <h1 style="text-align: center; font-size: 2.5rem; color: var(--gold); margin: 30px 0;">ENGLISH UNIVERSE</h1>
            
            <center><div class="section-title">📘 Vocabulary</div></center>
            <div class="menu-grid">
                <button class="topic-btn" style="background:#e67e22" onclick="start('animals')">🦁 ANIMALS</button>
                <button class="topic-btn" style="background:#3498db" onclick="start('food')">🍔 FOOD</button>
                <button class="topic-btn" style="background:#2ecc71" onclick="start('school')">📚 SCHOOL</button>
                <button class="topic-btn" style="background:#f1c40f; color:#000" onclick="start('family')">👪 FAMILY</button>
            </div>

            <center><div class="section-title">📝 Grammar</div></center>
            <div class="menu-grid">
                <button class="topic-btn" style="background:#9b59b6" onclick="start('present_perfect')">📌 PRES. PERFECT</button>
                <button class="topic-btn" style="background:#e74c3c" onclick="start('past_simple')">🕒 PAST SIMPLE</button>
                <button class="topic-btn" style="background:#1abc9c" onclick="start('modals')">⚡ MODALS</button>
                <button class="topic-btn" style="background:#d35400" onclick="start('comparison')">📏 COMPARISON</button>
            </div>
        </div>

        <div id="battle-screen" class="hidden">
            <div class="timer-box"><svg class="timer-svg"><circle class="timer-circle" cx="35" cy="35" r="33"></circle></svg></div>
            <div class="battle-zone">
                <div class="arena">
                    <h2 style="color:var(--red);">LIONS <br> <span id="s1" style="font-size: 1.5rem;">0</span></h2>
                    <img id="img1" class="q-img" src="">
                    <p id="txt1" style="min-height:30px; font-size: 0.9rem;"></p>
                    <input type="text" id="in1" class="ans-in" onkeydown="handleKey(event, 1)" autocomplete="off">
                </div>
                <div class="arena">
                    <h2 style="color:#3498db;">EAGLES <br> <span id="s2" style="font-size: 1.5rem;">0</span></h2>
                    <img id="img2" class="q-img" src="">
                    <p id="txt2" style="min-height:30px; font-size: 0.9rem;"></p>
                    <input type="text" id="in2" class="ans-in" onkeydown="handleKey(event, 2)" autocomplete="off">
                </div>
            </div>
        </div>
    </div>

    <div id="win-screen" class="hidden">
        <h1 style="color:var(--gold); font-size: 3rem;">PODIUM</h1>
        <div style="display: flex; align-items: flex-end; gap: 20px; height: 300px;">
            <div id="p2" class="podium-bar" style="background:#bdc3c7; height:0;">2nd</div>
            <div id="p1" class="podium-bar" style="background:#f1c40f; height:0;">1st</div>
        </div>
        <h2 id="final-res" style="margin-top: 40px;"></h2>
        <button style="padding: 10px 30px; cursor:pointer;" onclick="location.reload()">RESTART</button>
    </div>

    <audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"></audio>
    <audio id="win-sound" src="https://actions.google.com/sounds/v1/human_voices/crowd_cheer.ogg"></audio>

<script>
    const database = {
        animals: [
            {q:"tiger", t:"Big cat with stripes", i:"https://images.pexels.com/photos/792381/pexels-photo-792381.jpeg?w=300"},
            {q:"monkey", t:"Loves bananas", i:"https://images.pexels.com/photos/110820/pexels-photo-110820.jpeg?w=300"},
            {q:"giraffe", t:"Has a long neck", i:"https://images.pexels.com/photos/806441/pexels-photo-806441.jpeg?w=300"},
            {q:"elephant", t:"Has a long trunk", i:"https://images.pexels.com/photos/66898/elephant-cub-tsavo-kenya-66898.jpeg?w=300"},
            {q:"snake", t:"Long and slithers", i:"https://images.pexels.com/photos/1108192/pexels-photo-1108192.jpeg?w=300"},
            {q:"lion", t:"King of the jungle", i:"https://images.pexels.com/photos/247502/pexels-photo-247502.jpeg?w=300"},
            {q:"rabbit", t:"Eats carrots", i:"https://images.pexels.com/photos/326012/pexels-photo-326012.jpeg?w=300"},
            {q:"zebra", t:"Black and white stripes", i:"https://images.pexels.com/photos/1054655/pexels-photo-1054655.jpeg?w=300"},
            {q:"fox", t:"Clever and red", i:"https://images.pexels.com/photos/2295744/pexels-photo-2295744.jpeg?w=300"},
            {q:"bear", t:"Loves honey", i:"https://images.pexels.com/photos/35435/pexels-photo-35435.jpeg?w=300"}
        ],
        food: [
            {q:"pizza", t:"Italian food", i:"https://images.pexels.com/photos/1566837/pexels-photo-1566837.jpeg?w=300"},
            {q:"apple", t:"A red fruit", i:"https://images.pexels.com/photos/102104/pexels-photo-102104.jpeg?w=300"},
            {q:"burger", t:"Meat in bread", i:"https://images.pexels.com/photos/1639557/pexels-photo-1639557.jpeg?w=300"},
            {q:"banana", t:"Yellow fruit", i:"https://images.pexels.com/photos/2870882/pexels-photo-2870882.jpeg?w=300"},
            {q:"cake", t:"Sweet birthday treat", i:"https://images.pexels.com/photos/1126354/pexels-photo-1126354.jpeg?w=300"},
            {q:"milk", t:"White drink", i:"https://images.pexels.com/photos/248412/pexels-photo-248412.jpeg?w=300"},
            {q:"egg", t:"Chicken gives us this", i:"https://images.pexels.com/photos/162712/egg-white-food-protein-162712.jpeg?w=300"},
            {q:"bread", t:"Baked dough", i:"https://images.pexels.com/photos/209206/pexels-photo-209206.jpeg?w=300"},
            {q:"cheese", t:"Yellow and salty", i:"https://images.pexels.com/photos/773253/pexels-photo-773253.jpeg?w=300"},
            {q:"fish", t:"Lives in water", i:"https://images.pexels.com/photos/2290070/pexels-photo-2290070.jpeg?w=300"}
        ],
        present_perfect: [
            {q:"seen", t:"I have ____ (see) it.", i:"https://images.pexels.com/photos/7991579/pexels-photo-7991579.jpeg?w=300"},
            {q:"broken", t:"He has ____ (break) the cup.", i:"https://images.pexels.com/photos/5202925/pexels-photo-5202925.jpeg?w=300"},
            {q:"written", t:"She has ____ (write) a book.", i:"https://images.pexels.com/photos/210661/pexels-photo-210661.jpeg?w=300"},
            {q:"gone", t:"They have ____ (go) out.", i:"https://images.pexels.com/photos/301920/pexels-photo-301920.jpeg?w=300"},
            {q:"drunk", t:"I have ____ (drink) milk.", i:"https://images.pexels.com/photos/248412/pexels-photo-248412.jpeg?w=300"},
            {q:"done", t:"We have ____ (do) it.", i:"https://images.pexels.com/photos/159844/pexels-photo-159844.jpeg?w=300"},
            {q:"won", t:"You have ____ (win)!", i:"https://images.pexels.com/photos/46798/the-ball-stadion-football-the-pitch-46798.jpeg?w=300"},
            {q:"lost", t:"He has ____ (lose) keys.", i:"https://images.pexels.com/photos/101808/pexels-photo-101808.jpeg?w=300"},
            {q:"bought", t:"I have ____ (buy) bread.", i:"https://images.pexels.com/photos/209206/pexels-photo-209206.jpeg?w=300"},
            {q:"known", t:"I have ____ (know) her.", i:"https://images.pexels.com/photos/459466/pexels-photo-459466.jpeg?w=300"}
        ],
        school: [
            {q:"pen", t:"You write with this", i:"https://images.pexels.com/photos/163703/pen-writing-fountain-pen-ink-163703.jpeg?w=300"},
            {q:"book", t:"You read this", i:"https://images.pexels.com/photos/159866/books-book-pages-read-literature-159866.jpeg?w=300"},
            {q:"teacher", t:"Person who teaches", i:"https://images.pexels.com/photos/301920/pexels-photo-301920.jpeg?w=300"},
            {q:"student", t:"Person who learns", i:"https://images.pexels.com/photos/1438072/pexels-photo-1438072.jpeg?w=300"},
            {q:"ruler", t:"Used to draw lines", i:"https://images.pexels.com/photos/590561/pexels-photo-590561.jpeg?w=300"},
            {q:"bag", t:"You carry books in it", i:"https://images.pexels.com/photos/1152077/pexels-photo-1152077.jpeg?w=300"},
            {q:"desk", t:"You sit at this", i:"https://images.pexels.com/photos/289737/pexels-photo-289737.jpeg?w=300"},
            {q:"paper", t:"You write on this", i:"https://images.pexels.com/photos/3183183/pexels-photo-3183183.jpeg?w=300"},
            {q:"eraser", t:"Used to remove pencil", i:"https://images.pexels.com/photos/35202/eraser-office-supplies-rubber-clean.jpg?w=300"},
            {q:"blackboard", t:"Teacher writes on this", i:"https://images.pexels.com/photos/265076/pexels-photo-265076.jpeg?w=300"}
        ]
    };

    let p1L=[], p2L=[], p1i=0, p2i=0, sc1=0, sc2=0, bonus=1000, timer;

    function start(topic) {
        let list = database[topic] || database.animals;
        p1L = [...list].sort(() => Math.random() - 0.5);
        p2L = [...list].sort(() => Math.random() - 0.5);
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('battle-screen').classList.remove('hidden');
        document.getElementById('bg-music').play();
        load(1); load(2);
        resetTimer();
    }

    function resetTimer() {
        clearInterval(timer);
        let left = 10;
        const circ = document.querySelector('.timer-circle');
        timer = setInterval(() => {
            left -= 0.1;
            bonus = Math.max(100, Math.ceil(left * 100));
            circ.style.strokeDashoffset = 220 - (left/10)*220;
            if(left <= 0) left = 10;
        }, 100);
    }

    function load(p) {
        let idx = (p==1) ? p1i : p2i;
        let list = (p==1) ? p1L : p2L;
        if(idx >= list.length) {
            document.getElementById('in'+p).style.display = "none";
            document.getElementById('txt'+p).innerText = "FINISHED!";
            if(p1i >= p1L.length && p2i >= p2L.length) finish();
            return;
        }
        document.getElementById('img'+p).src = list[idx].i;
        document.getElementById('txt'+p).innerText = list[idx].t;
        document.getElementById('in'+p).value = "";
        document.getElementById('in'+p).focus();
    }

    function handleKey(e, p) {
        if(e.key === 'Enter') {
            let val = document.getElementById('in'+p).value.toLowerCase().trim();
            let list = (p==1) ? p1L : p2L;
            let idx = (p==1) ? p1i : p2i;

            if(val === list[idx].q.toLowerCase()) {
                if(p==1) { sc1 += bonus; p1i++; document.getElementById('s1').innerText=sc1; }
                else { sc2 += bonus; p2i++; document.getElementById('s2').innerText=sc2; }
            } else {
                // Ката болсо упай бербей кийинкиге өтөт
                if(p==1) p1i++; else p2i++;
                alert("Wrong! The correct was: " + list[idx].q);
            }
            load(p);
            resetTimer();
        }
    }

    function finish() {
        clearInterval(timer);
        document.getElementById('bg-music').pause();
        document.getElementById('win-sound').play();
        document.getElementById('battle-screen').classList.add('hidden');
        document.getElementById('win-screen').classList.remove('hidden');

        let w = sc1 >= sc2 ? {n:"LIONS", s:sc1} : {n:"EAGLES", s:sc2};
        let l = sc1 < sc2 ? {n:"LIONS", s:sc1} : {n:"EAGLES", s:sc2};

        document.getElementById('final-res').innerText = w.n + " WINS WITH " + w.s + " POINTS!";
        document.getElementById('p1').innerText = w.n + "\n" + w.s;
        document.getElementById('p2').innerText = l.n + "\n" + l.s;

        setTimeout(() => {
            document.getElementById('p1').style.height = "200px";
            document.getElementById('p2').style.height = "120px";
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }, 500);
    }
</script>
</body>
</html>
